  x.fillStyle = g; x.fillRect(-128, -128, 256, 256);
  x.restore();
  return new THREE.CanvasTexture(c);
}

// Moulded-plastic surface: a near-white colour-mottle map (subtle blotches + brushed
// horizontal grain) and a matching grayscale bump map. Kills the flat CAD look.
function makeCrtPlasticTex() {
  const N = 256;
  const mk = (base, spread, grain) => {
    const c = document.createElement('canvas'); c.width = c.height = N;
    const x = c.getContext('2d');
    const img = x.createImageData(N, N), d = img.data;
    for (let i = 0; i < d.length; i += 4) {
      const v = base + (Math.random() * 2 - 1) * spread;
      d[i] = d[i + 1] = d[i + 2] = v; d[i + 3] = 255;
    }
    x.putImageData(img, 0, 0);
    x.globalAlpha = grain;
    x.fillStyle = '#000';
    for (let yy = 0; yy < N; yy += 3) x.fillRect(0, yy, N, 1);   // brushed grain
    x.globalAlpha = 1;
    const t = new THREE.CanvasTexture(c);
    t.wrapS = t.wrapT = THREE.RepeatWrapping; t.repeat.set(2, 2);
    return t;
  };
  return { map: mk(243, 10, 0.06), bump: mk(126, 26, 0.18) };
}

// Top-vent slots (transparent dark slits laid over the body's top face).
function makeCrtVentTex() {
  const c = document.createElement('canvas'); c.width = 128; c.height = 80;
  const x = c.getContext('2d');
  x.clearRect(0, 0, 128, 80);
  x.fillStyle = 'rgba(0,0,0,0.5)';
  for (let y = 10; y < 70; y += 9) x.fillRect(14, y, 100, 4);
  return new THREE.CanvasTexture(c);
}

// Brand wordmark printed on the control strip.
function makeCrtBadgeTex() {
  const c = document.createElement('canvas'); c.width = 256; c.height = 64;
  const x = c.getContext('2d');
  x.clearRect(0, 0, 256, 64);
  x.fillStyle = 'rgba(196,201,208,0.82)';
  x.font = '700 26px Georgia, "Times New Roman", serif';
  x.textAlign = 'center'; x.textBaseline = 'middle';
  x.fillText('SKIN DEEP', 128, 34);
  return new THREE.CanvasTexture(c);
}

// Assemble the TV from primitives. The body never changes, so this is built once
// and cached on CRT._model, reused across opens (mirrors VINYL._box).
function _buildCrtTv() {
  const g = new THREE.Group();
  const S  = CRT_SIZE;
  const W  = S, H = S * 0.84, D = S * 0.9;   // body: slightly wider than tall, deep
  const fz = D / 2;                          // front face plane (+Z faces the player)

  // Materials — strong tonal hierarchy so the warm room light can't flatten it:
  // mid-charcoal body, near-black glossy bezel frame, very dark glass.
  // Body kept genuinely dark so it reads as charcoal plastic (not blown to cream) under
  // the bright warm orb light, matching the reference set.
  const bodyMat   = new THREE.MeshStandardMaterial({ color: 0x16181c, roughness: 0.76, metalness: 0.04, map: CRT.plasticMap, bumpMap: CRT.plasticBump, bumpScale: 0.02 });
  // No colour map on the bezel — a near-white mottle map would lift it; we want it to
  // stay near-black under the bright warm room light so it frames the screen.
  const bezelMat  = new THREE.MeshStandardMaterial({ color: 0x070709, roughness: 0.5, metalness: 0.04, bumpMap: CRT.plasticBump, bumpScale: 0.012 });
  const lipMat    = new THREE.MeshStandardMaterial({ color: 0x303338, roughness: 0.55, metalness: 0.08 });
  const knobMat   = new THREE.MeshStandardMaterial({ color: 0x34363c, roughness: 0.32, metalness: 0.18 });
  const knobBaseMat = new THREE.MeshStandardMaterial({ color: 0x141518, roughness: 0.6, metalness: 0.05 });
  const notchMat  = new THREE.MeshStandardMaterial({ color: 0x0a0b0d, roughness: 0.6, metalness: 0.0 });
  const buttonMat = new THREE.MeshStandardMaterial({ color: 0x3b3e44, roughness: 0.45, metalness: 0.1 });
  const grilleMat = new THREE.MeshStandardMaterial({ map: CRT.grilleTex, roughness: 0.85, metalness: 0.0 });
  const badgeMat  = new THREE.MeshBasicMaterial({ map: CRT.badgeTex, transparent: true, depthWrite: false });
  const ventMat   = new THREE.MeshBasicMaterial({ map: CRT.ventTex, transparent: true, depthWrite: false });
  const ledMat    = new THREE.MeshStandardMaterial({ color: 0x2a1402, roughness: 0.4, emissive: 0xff8a24, emissiveIntensity: 1.7 });
  const backingMat = new THREE.MeshStandardMaterial({ color: 0x05080a, roughness: 0.5, metalness: 0.0 });
  const screenMat = new THREE.MeshStandardMaterial({
    color: 0x070f0c, roughness: 0.1, metalness: 0.22,
    emissive: 0x2b4a3a, emissiveMap: CRT.staticTex, emissiveIntensity: 0.45,
  });
  const glareMat  = new THREE.MeshBasicMaterial({
    map: CRT.glareTex, transparent: true, blending: THREE.AdditiveBlending,
    depthWrite: false, opacity: 0.5,
  });
  CRT.screenMat = screenMat;

  // Body shell
  const body = new THREE.Mesh(new THREE.BoxGeometry(W, H, D), bodyMat);
  g.add(body);

  // ── Screen ── centred a little above middle, framed by a near-black bezel.
  const scY    = H * 0.11;
  const openW  = W * 0.61, openH = openW * 0.77;  // ~4:3 opening
  const frameT = 0.14;
  const glassW = openW + 0.10, glassH = openH + 0.10;

  // Dark backing behind the glass so the recess never shows through to the body.
  const backing = new THREE.Mesh(new THREE.PlaneGeometry(openW * 1.04, openH * 1.04), backingMat);
  backing.position.set(0, scY, fz - 0.05);
  g.add(backing);

  // Convex glass — a shallow spherical cap oriented to bulge toward the player.
  const capR = S * 1.6, capTheta = 0.22;
  const screenGeo = new THREE.SphereGeometry(capR, 36, 24, 0, Math.PI * 2, 0, capTheta);
  screenGeo.rotateX(Math.PI / 2);     // pole +Y -> +Z (face the player)
  screenGeo.translate(0, 0, -capR);   // bring the cap apex to the origin
  const rim = capR * Math.sin(capTheta);
  const screen = new THREE.Mesh(screenGeo, screenMat);
  screen.scale.set((glassW / 2) / rim, (glassH / 2) / rim, 1);
  screen.position.set(0, scY, fz + 0.06);
  g.add(screen);

  // Soft glare in front of the glass
  const glare = new THREE.Mesh(new THREE.PlaneGeometry(glassW * 0.9, glassH * 0.9), glareMat);
  glare.position.set(0, scY, fz + 0.1);
  glare.renderOrder = 3;
  g.add(glare);

  // Bezel frame — four near-black bars around the opening, proud of the body front.
  const bezelMeshes = [
    [openW + 2 * frameT, frameT, 0,                       scY + openH / 2 + frameT / 2],  // top
    [openW + 2 * frameT, frameT, 0,                       scY - openH / 2 - frameT / 2],  // bottom
    [frameT, openH,             -(openW / 2 + frameT / 2), scY],                           // left
    [frameT, openH,              (openW / 2 + frameT / 2), scY],                           // right
  ];
  bezelMeshes.forEach(([bw, bh, bx, by]) => {
    const bar = new THREE.Mesh(new THREE.BoxGeometry(bw, bh, 0.08), bezelMat);
    bar.position.set(bx, by, fz + 0.03);
    g.add(bar);
  });

  // Thin lighter lip just inside the bezel — the plastic edge that catches light.
  const lipT = 0.022;
  [[openW + lipT * 2, lipT, 0, scY + openH / 2 + lipT / 2],
   [openW + lipT * 2, lipT, 0, scY - openH / 2 - lipT / 2],
   [lipT, openH, -(openW / 2 + lipT / 2), scY],
   [lipT, openH,  (openW / 2 + lipT / 2), scY]].forEach(([lw, lh, lx, ly]) => {
    const lip = new THREE.Mesh(new THREE.BoxGeometry(lw, lh, 0.05), lipMat);
    lip.position.set(lx, ly, fz + 0.075);
    g.add(lip);
  });

  // ── Control strip (below the bezel) ──
  // Speaker grille, left
  const grille = new THREE.Mesh(new THREE.PlaneGeometry(W * 0.30, H * 0.20), grilleMat);
  grille.position.set(-W * 0.27, -H * 0.35, fz + 0.006);
  g.add(grille);

  // Brand badge, centred under the screen
  const badge = new THREE.Mesh(new THREE.PlaneGeometry(W * 0.24, W * 0.06), badgeMat);
  badge.position.set(W * 0.03, -H * 0.27, fz + 0.007);
  g.add(badge);

  // Knobs / dials, right — base ring + dial + indicator notch (protrude along +Z)
  const r = S * 0.04;
  const knobGeo = new THREE.CylinderGeometry(r, r * 0.92, 0.055, 24);
  const baseGeo = new THREE.CylinderGeometry(r * 1.28, r * 1.28, 0.025, 24);
  const notchGeo = new THREE.BoxGeometry(0.012, r * 0.72, 0.02);
  [0.20, 0.33].forEach(kx => {
    const base = new THREE.Mesh(baseGeo, knobBaseMat);
    base.rotation.x = Math.PI / 2; base.position.set(W * kx, -H * 0.32, fz + 0.028);
    g.add(base);
    const knob = new THREE.Mesh(knobGeo, knobMat);
    knob.rotation.x = Math.PI / 2; knob.position.set(W * kx, -H * 0.32, fz + 0.05);
    g.add(knob);
    const notch = new THREE.Mesh(notchGeo, notchMat);
    notch.position.set(W * kx, -H * 0.32 + r * 0.45, fz + 0.082);
    g.add(notch);
  });

  // Power LED
  const led = new THREE.Mesh(new THREE.CylinderGeometry(0.018, 0.018, 0.02, 12), ledMat);
  led.rotation.x = Math.PI / 2; led.position.set(W * 0.13, -H * 0.30, fz + 0.03);
  g.add(led);

  // Small buttons, lower right
  const btnGeo = new THREE.BoxGeometry(W * 0.05, H * 0.028, 0.03);
  [0.16, 0.26, 0.36].forEach(bx => {
    const btn = new THREE.Mesh(btnGeo, buttonMat);
    btn.position.set(W * bx, -H * 0.45, fz + 0.02);
    g.add(btn);
  });

  // Top vents
  const vents = new THREE.Mesh(new THREE.PlaneGeometry(W * 0.5, D * 0.34), ventMat);
  vents.rotation.x = -Math.PI / 2;
  vents.position.set(0, H / 2 + 0.002, -D * 0.16);
  g.add(vents);

  // Feet, bottom corners (dark rubber)
  const footMat = new THREE.MeshStandardMaterial({ color: 0x141414, roughness: 0.8, metalness: 0.0 });
  const footGeo = new THREE.BoxGeometry(W * 0.07, H * 0.06, D * 0.07);
  [[-1, -1], [-1, 1], [1, -1], [1, 1]].forEach(([sx, sz]) => {
    const foot = new THREE.Mesh(footGeo, footMat);
    foot.position.set(sx * (W / 2 - W * 0.09), -H / 2 - H * 0.03, sz * (D / 2 - D * 0.09));
    g.add(foot);
  });

  return g;
}

// Build the canvas textures + cache the model once (mirrors _buildVinylAssets).
function _buildCrtAssets() {
  if (CRT._built) return;
  CRT.staticTex = makeCrtStaticTex(); _initTex(CRT.staticTex);
  CRT.grilleTex = makeCrtGrilleTex(); _initTex(CRT.grilleTex);
  CRT.glareTex  = makeCrtGlareTex();  _initTex(CRT.glareTex);
  const plastic = makeCrtPlasticTex();
  CRT.plasticMap  = plastic.map;  _initTex(CRT.plasticMap);
  CRT.plasticBump = plastic.bump; _initTex(CRT.plasticBump);
  CRT.ventTex  = makeCrtVentTex();  _initTex(CRT.ventTex);
  CRT.badgeTex = makeCrtBadgeTex(); _initTex(CRT.badgeTex);
  CRT._model = _buildCrtTv();
  CRT._built = true;
}

function _openCrt(px, pz, openYaw) {
  if (crtPhase || cratePhase || exhibitPhase) return;
  _buildCrtAssets();
  _savedDPR = curDPR;
  curDPR = EXHIBIT_DPR;
  _applyDPR();

  crtOpen  = true;
  crtPhase = 'opening';
  crtT     = 0;
  exhibitTriggerFloater = _crtFloater;
  _setFloaterVisible(exhibitTriggerFloater, false);

  crtGroup = new THREE.Group();
  _crtFwd.set(Math.sin(openYaw), 0, Math.cos(openYaw));
  crtGroup.position.set(px + _crtFwd.x * CRATE_DIST, CRT_Y, pz + _crtFwd.z * CRATE_DIST);
  crtGroup.rotation.y = openYaw + Math.PI;   // face the player
  scene.add(crtGroup);

  // The cached model is detached (not disposed) on close, so it survives across opens.
  crtGroup.add(CRT._model);
  crtGroup.userData.model = CRT._model;

  crtGroup.scale.setScalar(0.04);
}

function _closeCrt() {
  if (crtGroup) {
    if (crtGroup.userData.model) crtGroup.remove(crtGroup.userData.model); // keep the cached model
    _disposeCrateObject(crtGroup);
    scene.remove(crtGroup);
    crtGroup = null;
  }
  crtOpen  = false;
  crtPhase = null;
  crtT     = 0;
  curDPR = _savedDPR;
  _applyDPR();
  _restoreExhibitFloater();
  iCD = 0.6;
}

function _dismissCrt() {
  if (!crtPhase || crtPhase === 'closing') return;
  crtPhase = 'closing';
  crtT = 1;
  _restoreExhibitFloater();
}

// Mobile frame-rate governor (caps to 60fps on high-refresh devices)
let _mobileAcc = 0;
const _MOBILE_TARGET = 1 / 60;
// Per-frame counters for throttled subsystems
let _moteFrame = 0;
let _mmFrame   = 0;

// ── ADAPTIVE RESOLUTION SCALING ──
// Measures the interval between processed frames and nudges the render DPR up/down
// to stay at ~60fps: lower fast when we drop frames, raise gently when steady.
let _lastFrameTs = performance.now();
let _emaFrameMs  = 1000 / 60;
let _drsFrame    = 0;
const _DRS_INTERVAL = 30; // evaluate ~twice per second
// Re-applying the same pixel ratio + size still reallocates the WebGL drawing
// buffer in most browsers, which shows up as a one-frame hitch. Opening/closing
// an exhibit calls this every time, so skip the resize when nothing actually
// changed (the common case on machines already holding full DPR) to keep the
// spin-in animation smooth.
let _lastAppliedDPR = curDPR;
let _lastAppliedW = window.innerWidth;
let _lastAppliedH = window.innerHeight;
function _applyDPR(force) {
  const w = window.innerWidth, h = window.innerHeight;
  if (!force && curDPR === _lastAppliedDPR && w === _lastAppliedW && h === _lastAppliedH) return;
  _lastAppliedDPR = curDPR;
  _lastAppliedW = w;
  _lastAppliedH = h;
  renderer.setPixelRatio(curDPR);
  renderer.setSize(w, h);
}

// (tutorial handles initial guidance)

// Cached DOM references — queried once instead of every frame
const _elKeySpace    = document.getElementById('key-space');
const _elPrompt      = document.getElementById('interact-prompt');
const _elToast       = document.getElementById('toast');
const _elIprLabel    = document.getElementById('ipr-label');
const _elIprIcon     = document.getElementById('ipr-icon');
const _elAimReticle  = document.getElementById('aim-reticle');
const _elUi               = document.getElementById('ui');
const _elMmWrap           = document.getElementById('minimap-wrap');
const _elFocusEscapeHint  = document.getElementById('focus-escape-hint');
const _elCratePrev   = document.getElementById('crate-prev-btn');
const _elCrateNext   = document.getElementById('crate-next-btn');
const _elCrateBrowseHint = document.getElementById('crate-browse-hint');
let   _crateBrowseHintTimer = null;
let   _crateNavPulseTimer   = null;

function _hideCrateNav() {
  if (_elCratePrev) _elCratePrev.classList.remove('visible', 'hint-pulse');
  if (_elCrateNext) _elCrateNext.classList.remove('visible', 'hint-pulse');
  clearTimeout(_crateNavPulseTimer);
}

function _showCrateNav(pulse) {
  if (VINYL.records.length < 2) return;
  if (_elCratePrev) _elCratePrev.classList.add('visible');
  if (_elCrateNext) _elCrateNext.classList.add('visible');
  if (pulse && isMobile) {
    _elCratePrev?.classList.add('hint-pulse');
    _elCrateNext?.classList.add('hint-pulse');
    clearTimeout(_crateNavPulseTimer);
    _crateNavPulseTimer = setTimeout(() => {
      _elCratePrev?.classList.remove('hint-pulse');
      _elCrateNext?.classList.remove('hint-pulse');
    }, 4200);
  }
}

function _hideCrateBrowseHint() {
  clearTimeout(_crateBrowseHintTimer);
  _elCrateBrowseHint?.classList.remove('visible', 'dim');
}

function _showCrateBrowseHint() {
  if (!_elCrateBrowseHint || cratePhase !== 'browsing' || crateFocusPhase) return;
  const multi = VINYL.records.length > 1;
  if (isMobile) {
    if (!multi) { _hideCrateBrowseHint(); return; }
    _elCrateBrowseHint.innerHTML =
      `<span class="cbh-keys"><span class="feh-key">&lsaquo;</span><span class="feh-key">&rsaquo;</span></span>` +
      `<span class="feh-label">tap arrows to browse records</span>`;
  } else {
    const browseKeys = multi
      ? `<span class="cbh-keys"><span class="feh-key">&uarr;</span><span class="feh-key">&darr;</span></span><span class="feh-label">browse records</span><span class="feh-label" style="opacity:0.35;margin:0 6px">&middot;</span>`
      : '';
    _elCrateBrowseHint.innerHTML = browseKeys + `<span class="feh-key">esc</span><span class="feh-label">close</span>`;
  }
  _elCrateBrowseHint.classList.remove('dim');
  _elCrateBrowseHint.classList.add('visible');
  clearTimeout(_crateBrowseHintTimer);
  if (isMobile && multi) {
    _crateBrowseHintTimer = setTimeout(() => _elCrateBrowseHint.classList.add('dim'), 3800);
  }
}
const _elCrateSc       = document.getElementById('crate-sc-embed');
const _elCrateScIframe = document.getElementById('crate-sc-iframe');
const _elCrateScCredit = document.getElementById('crate-sc-credit');

function _showCrateScEmbed(rec) {
  if (!_elCrateSc || !rec || !rec.soundcloud) return;
  if (_elCrateScIframe && _elCrateScIframe.src !== rec.soundcloud) _elCrateScIframe.src = rec.soundcloud;
  if (_elCrateScCredit && rec.creditUser && rec.creditTrack) {
    _elCrateScCredit.innerHTML =
      `<a href="${rec.creditUser}" title="${rec.creditUserLabel}" target="_blank">${rec.creditUserLabel}</a>` +
      ` &middot; <a href="${rec.creditTrack}" title="${rec.creditTrackLabel}" target="_blank">${rec.creditTrackLabel}</a>`;
  }
  _elCrateSc.classList.add('visible');
}

function _hideCrateScEmbed() {
  if (!_elCrateSc) return;
  _elCrateSc.classList.remove('visible');
  // Clearing the src stops any playing audio when leaving the focused record.
  if (_elCrateScIframe) _elCrateScIframe.src = '';
}
const _elExhibitPrev = document.getElementById('exhibit-prev');
const _elExhibitNext = document.getElementById('exhibit-next');
let   _focusEscapeTimer = null;

function _showFocusEscapeHint() {
  _elFocusEscapeHint.innerHTML = isMobile
    ? `<span class="feh-label">tap to return</span>`
    : `<span class="feh-key">esc</span><span class="feh-label">back</span>`;
  _elFocusEscapeHint.classList.remove('dim');
  _elFocusEscapeHint.classList.add('visible');
  clearTimeout(_focusEscapeTimer);
  _focusEscapeTimer = setTimeout(() => _elFocusEscapeHint.classList.add('dim'), 2800);
}

function _showExhibitFocusHints() {
  const sep = `<span class="feh-label" style="opacity:0.35;margin:0 6px">&middot;</span>`;
  if (isMobile) {
    _elFocusEscapeHint.innerHTML = exhibitPanelN >= 2
      ? `<span class="feh-label">tap sides to browse</span>${sep}<span class="feh-label">tap to return</span>`
      : `<span class="feh-label">tap to return</span>`;
  } else {
    const browse = exhibitPanelN >= 2
      ? `<span style="display:inline-flex;gap:4px"><span class="feh-key">&larr;</span><span class="feh-key">&rarr;</span></span><span class="feh-label">browse</span>${sep}`
      : '';
    _elFocusEscapeHint.innerHTML = browse + `<span class="feh-key">esc</span><span class="feh-label">back</span>`;
  }
  _elFocusEscapeHint.classList.remove('dim');
  _elFocusEscapeHint.classList.add('visible');
  clearTimeout(_focusEscapeTimer);
  _focusEscapeTimer = setTimeout(() => _elFocusEscapeHint.classList.add('dim'), 3200);
  _showExhibitFocusNav();
}

function _hideFocusEscapeHint() {
  clearTimeout(_focusEscapeTimer);
  _elFocusEscapeHint.classList.remove('visible', 'dim');
}

if (_elCratePrev) {
  const _cratePrevFire = e => {
    e.preventDefault(); e.stopPropagation();
    _elCratePrev.classList.remove('hint-pulse');
    _elCrateNext?.classList.remove('hint-pulse');
    clearTimeout(_crateNavPulseTimer);
    _startCrateSwap(-1);
  };
  _elCratePrev.addEventListener('click', _cratePrevFire);
  _elCratePrev.addEventListener('touchstart', _cratePrevFire, { passive: false });
}
if (_elCrateNext) {
  const _crateNextFire = e => {
    e.preventDefault(); e.stopPropagation();
    _elCrateNext.classList.remove('hint-pulse');
    _elCratePrev?.classList.remove('hint-pulse');
    clearTimeout(_crateNavPulseTimer);
    _startCrateSwap(1);
  };
  _elCrateNext.addEventListener('click', _crateNextFire);
  _elCrateNext.addEventListener('touchstart', _crateNextFire, { passive: false });
}

const _exhibitNavFire = (dir, e) => {
  e.preventDefault();
  e.stopPropagation();
  _hideExhibitPanGuide();
  if (exhibitFocusPhase === 'focused') _exhibitFocusStep(dir);
  else if (exhibitPhase === 'open' && !exhibitFocusPhase) _exhibitStep(dir);
};
if (_elExhibitPrev) {
  _elExhibitPrev.addEventListener('click', e => _exhibitNavFire(-1, e));
  _elExhibitPrev.addEventListener('touchstart', e => _exhibitNavFire(-1, e), { passive: false });
  _elExhibitPrev.addEventListener('touchmove', e => { e.stopPropagation(); }, { passive: false });
}
if (_elExhibitNext) {
  _elExhibitNext.addEventListener('click', e => _exhibitNavFire(1, e));
  _elExhibitNext.addEventListener('touchstart', e => _exhibitNavFire(1, e), { passive: false });
  _elExhibitNext.addEventListener('touchmove', e => { e.stopPropagation(); }, { passive: false });
}

function animate() {
  requestAnimationFrame(animate);
  const rawDt = clock.getDelta();
  // On mobile: accumulate time and only update/render at ~60fps
  if (isMobile) {
    _mobileAcc += rawDt;
    if (_mobileAcc < _MOBILE_TARGET) return;
  }
  const dt = Math.min(isMobile ? _mobileAcc : rawDt, 0.05);
  if (isMobile) _mobileAcc = 0;
  const t  = clock.elapsedTime;

  // Adaptive resolution: track the processed-frame interval and retune DPR periodically.
  const _nowTs = performance.now();
  _emaFrameMs = _emaFrameMs * 0.9 + (_nowTs - _lastFrameTs) * 0.1;
  _lastFrameTs = _nowTs;
  // Paused while an exhibit is open so an FPS dip can't claw back card resolution
  if (!exhibitPhase && !crateOpen && ++_drsFrame >= _DRS_INTERVAL) {
    _drsFrame = 0;
    const fps = 1000 / _emaFrameMs;
    if (fps < 54 && curDPR > MIN_DPR) {            // dropping frames — back off resolution fast
      curDPR = Math.max(MIN_DPR, curDPR - 0.2); _applyDPR();
    } else if (fps > 58.5 && curDPR < MAX_DPR) {   // steady 60 — climb toward max gently
      curDPR = Math.min(MAX_DPR, curDPR + 0.1); _applyDPR();
    }
  }

  _fwd.set(Math.sin(yaw), 0, Math.cos(yaw));
  _rgt.set(-Math.cos(yaw), 0, Math.sin(yaw));
  let moving = false;
  const _exhibitLocked = exhibitFocusPhase === 'focusing' || exhibitFocusPhase === 'focused' || exhibitFocusPhase === 'switching';
  // The crate stays open while browsing — the visitor roams freely and simply
  // walks out of range to dismiss it, just like the other exhibitions. Movement
  // freezes only while a disc is held in focus so it stays centred.
  const _crateLocked = crateFocusPhase === 'focusing' || crateFocusPhase === 'focused';
  const _inputLocked = _exhibitLocked || _crateLocked;

  // Arrow keys rotate camera — frozen while reading a focused panel / crate
  if (!_inputLocked) {
    if(keys['ArrowLeft'])  yaw += CAM_TURN * dt;
    if(keys['ArrowRight']) yaw -= CAM_TURN * dt;
  }

  // WASD moves
  if (!_inputLocked) {
    if(keys['KeyW']) { player.position.addScaledVector(_fwd, SPEED*dt); moving=true; }
    if(keys['KeyS']) { player.position.addScaledVector(_fwd,-SPEED*dt); moving=true; }
    if(keys['KeyA']) { player.position.addScaledVector(_rgt,-SPEED*dt); moving=true; }
    if(keys['KeyD']) { player.position.addScaledVector(_rgt, SPEED*dt); moving=true; }
  }

  // Virtual joystick movement
  if (!_inputLocked && _joy.active && (Math.abs(_joy.dx) > 8 || Math.abs(_joy.dy) > 8)) {
    player.position.addScaledVector(_rgt,  (_joy.dx / JR) * SPEED * dt);
    player.position.addScaledVector(_fwd, -(_joy.dy / JR) * SPEED * dt);
    moving = true;
  }

  player.position.x = Math.max(-BOUND, Math.min(BOUND, player.position.x));
  player.position.z = Math.max(-BOUND, Math.min(BOUND, player.position.z));
  player.position.y = 0;

  // Orb pulse
  const pulse = 1 + Math.sin(t*2.7)*0.06;
  orbMesh.scale.setScalar(pulse);

  // Room reveal — progress from 0 (dark) to 1 (fully lit) after first interaction
  if (roomRevealed && revealT < 1) revealT = Math.min(1, revealT + dt * 0.32);
  const _rSmooth = revealT * revealT * (3 - 2 * revealT); // smoothstep
  const _wantFocusDim = (exhibitFocusPhase === 'focusing' || exhibitFocusPhase === 'focused' || exhibitFocusPhase === 'switching'
                         || crateFocusPhase === 'focusing' || crateFocusPhase === 'focused') ? 1 : 0;
  focusDimT += (_wantFocusDim - focusDimT) * Math.min(1, dt * 5.5);
  const _roomLight = _rSmooth * (1 - focusDimT * 0.94);
  ambientLight.intensity    = _roomLight * 0.15;
  beamLight.intensity       = Math.max(0, 1 - _rSmooth * 2.5) * 6.0 * (1 - focusDimT);
  beamCone.material.opacity = Math.max(0, 1 - _rSmooth * 2.5) * 0.045 * (1 - focusDimT);
  scene.fog.density         = FOG_BASE + focusDimT * 0.11;

  // Remaining floater beams fade IN with the reveal
  floaters.forEach((f, i) => {
    if (i === 0 || !f.beamCone) return;
    if (f.beam) f.beam.intensity = _roomLight * 6.0;
    f.beamCone.material.opacity = _roomLight * BEAM_CONE_OPACITY;
    if (f.floorSpot) f.floorSpot.material.opacity = _roomLight * BEAM_FLOOR_SPOT_OPACITY;
  });

  const _orbDim = 1 - focusDimT * 0.82;
  orbLight.intensity    = (12.0 + Math.sin(t*2.4)*1.2) * _orbDim;
  fillLight.intensity   = (0.45 + Math.sin(t*1.8+1)*0.06) * _orbDim;
  featherLight.intensity= (0.15 + Math.sin(t*1.3+2)*0.02) * _orbDim;

  // Blob shadow follows orb
  blobShadow.position.x = player.position.x;
  blobShadow.position.z = player.position.z;
  blobShadow.material.opacity = 0.72 - Math.sin(t*2.7)*0.08;

  // Dust motes drift around player — throttled to every 2nd frame on all platforms
  _moteFrame++;
  if (_moteFrame % 2 === 0) {
    for(let i=0;i<MOTE_N;i++){
      motePhase[i] += dt*0.04;
      motePos[i*3]   = player.position.x + Math.sin(motePhase[i]*1.1+i*0.7)*10;
      motePos[i*3+1] = 0.25 + Math.abs(Math.sin(motePhase[i]*0.6+i*0.4))*3.5;
      motePos[i*3+2] = player.position.z + Math.cos(motePhase[i]*0.9+i*0.3)*10;
    }
    moteGeo.attributes.position.needsUpdate = true;
  }

  // Particle trail
  if(moving){ spawnAcc+=dt; if(spawnAcc>0.055){spawnP(player.position.x,player.position.z);spawnAcc=0;} }
  tickP(dt);

  // Tutorial step advancement
  if (tutStage === 2 && moving) _tutShow(3);

  // Floaters
  near.ref=null; near.dist=Infinity;
  floaters.forEach(f => {
    f.phase += dt;
    const floatY = Math.sin(f.phase*1.3)*0.14;
    f.mesh.position.y = f.baseY + floatY;
    f.mesh.rotation.x += f.rotSpeed;
    f.mesh.rotation.y += f.rotSpeed*1.4;
    if (f.light) f.light.position.copy(f.mesh.position);

    // Aura tracks main mesh exactly
    f.aura.position.copy(f.mesh.position);
    f.aura.rotation.copy(f.mesh.rotation);

    // Orbit ring spins on its own tilted axes
    f.ring.position.copy(f.mesh.position);
    f.ring.rotation.y += f.rotSpeed * 0.75;
    f.ring.rotation.z += f.rotSpeed * 0.45;

    // Shadow disc: tracks X/Z, opacity deepens as floater descends
    f.fShadow.position.x = f.mesh.position.x;
    f.fShadow.position.z = f.mesh.position.z;
    f.fShadow.material.opacity = 0.4 - floatY * 0.8;
    if (f.floorSpot) {
      f.floorSpot.position.x = f.mesh.position.x;
      f.floorSpot.position.z = f.mesh.position.z;
    }

    const dx=player.position.x-f.mesh.position.x, dz=player.position.z-f.mesh.position.z;
    const dist2=dx*dx+dz*dz;
    // Only sqrt when within influence radius (dist < 5 → dist2 < 25); saves 9 sqrts/frame when far
    const prox=dist2<25 ? Math.max(0,1-Math.sqrt(dist2)/5) : 0;
    f.mesh.material.emissiveIntensity = (1.4 + prox * 3.2) * _rSmooth;
    f.aura.material.opacity = (0.07 + prox * 0.15) * _rSmooth;
    f.ring.material.opacity  = (0.36 + prox * 0.28) * _rSmooth;
    const _lightI = (0.9 + prox * 2.2) * _rSmooth;
    if (f.light) f.light.intensity = _lightI; // desktop: per-floater light
    f._lightI = _lightI;                       // mobile: consumed by the shared pool
    f._dist2  = dist2;

    if(!f._hidden && dist2<near.dist){ near.dist=dist2; if(dist2<EXHIBIT_TRIGGER_R2)near.ref=f; }
    // Advance tutorial when player reaches the octahedron
    if (tutStage === 3 && f === floaters[0] && dist2 < 7.84) _tutShow(4);
  });

  // Mobile: drive the shared light pool from the nearest floaters
  if (isMobile) {
    const _nearest = floaters.filter(f => !f._hidden).slice().sort((a, b) => a._dist2 - b._dist2);
    for (let i = 0; i < _mobileLights.length; i++) {
      const pl = _mobileLights[i];
      const f  = _nearest[i];
      if (f) {
        pl.position.copy(f.mesh.position);
        pl.color.setHex(f.color);
        pl.intensity = f._lightI;
      } else {
        pl.intensity = 0;
      }
    }
  }

  // Auto-close exhibit/crate when player walks away from the trigger floater
  _leaveExhibitRadius();

  // Interact (Space / E) and dismiss (Escape — desktop only)
  const eDown = keys['KeyE'] || keys['Space'];
  const escDown = !isMobile && keys['Escape'];

  // Camera — sync early so raycasts and screen projections match the rendered view
  _syncCamera();

  const exhibitAimable = exhibitPhase === 'open' && !exhibitFocusPhase;
  const exhibitAimedIdx = exhibitAimable ? _getAimedExhibitPanelIdx() : -1;
  let exhibitCanFocus = exhibitAimedIdx >= 0;

  const crateAimedDisc = _getAimedCrateDisc();
  const crateCanFocus  = !!crateAimedDisc;

  // Proximity prompt — project above the near object (hidden while exhibit is open)
  if (near.ref && tutStage >= 3 && iCD <= 0 && !exhibitOpen && !crateOpen && !_elToast.classList.contains('visible')) {
    const _wp = new THREE.Vector3();
    near.ref.mesh.getWorldPosition(_wp);
    _wp.y += 0.55; // offset just above object
    _wp.project(camera);
    const px = ( _wp.x * 0.5 + 0.5) * window.innerWidth;
    const py = (-_wp.y * 0.5 + 0.5) * window.innerHeight;
    _elPrompt.style.left = px + 'px';
    _elPrompt.style.top  = py + 'px';
    if (!_elPrompt.classList.contains('visible')) {
      _elIprLabel.textContent = isMobile ? 'tap' : 'interact';
      const iconEl = _elIprIcon;
      if (isMobile) {
        iconEl.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="rgba(255,210,120,0.95)" stroke-width="1.5" width="16" height="16"><path d="M12 3v2M12 19v2M3 12H1M23 12h-2M18.36 5.64l-1.41 1.41M7.05 16.95l-1.41 1.41M18.36 18.36l-1.41-1.41M7.05 7.05L5.64 5.64"/><circle cx="12" cy="12" r="4" fill="rgba(255,180,60,0.15)"/></svg>`;
      } else {
        iconEl.innerHTML = `<span style="font-family:Georgia,serif;font-size:9px;letter-spacing:0.05em;color:rgba(255,220,140,0.95)">spc</span>`;
      }
      _elPrompt.classList.add('visible');
    }
  } else {
    _elPrompt.classList.remove('visible');
  }

  // Exhibit aim reticle — only visible when the aim is locked onto a panel
  if (exhibitPhase === 'open' && !exhibitFocusPhase) {
    if (exhibitCanFocus) {
      const tp = exhibitPlanes[exhibitAimedIdx].mesh;
      tp.getWorldPosition(_panelWp);
      _panelWp.project(camera);
      const rx = (_panelWp.x * 0.5 + 0.5) * window.innerWidth;
      const ry = (-_panelWp.y * 0.5 + 0.5) * window.innerHeight;
      _elAimReticle.style.left = rx + 'px';
      _elAimReticle.style.top  = ry + 'px';
      _elAimReticle.classList.add('visible');
      _elAimReticle.classList.add('locked');
      _elPrompt.style.left = rx + 'px';
      _elPrompt.style.top  = (ry - 36) + 'px';
      _elIprLabel.textContent = isMobile ? 'tap to focus' : 'focus';
      const iconEl = _elIprIcon;
      if (isMobile) {
        iconEl.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="rgba(255,210,120,0.95)" stroke-width="1.5" width="16" height="16"><circle cx="12" cy="12" r="7"/><circle cx="12" cy="12" r="2" fill="rgba(255,180,60,0.35)"/></svg>`;
      } else {
        iconEl.innerHTML = `<span style="font-family:Georgia,serif;font-size:9px;letter-spacing:0.05em;color:rgba(255,220,140,0.95)">spc</span>`;
      }
      _elPrompt.classList.add('visible');
    } else {
      _elAimReticle.classList.remove('visible');
      _elAimReticle.classList.remove('locked');
      _elPrompt.classList.remove('visible');
    }
  } else if (cratePhase === 'browsing' && !crateFocusPhase) {
    // Crate disc aim reticle — locks onto the raised record's disc
    if (crateCanFocus) {
      crateAimedDisc.getWorldPosition(_panelWp);
      _panelWp.project(camera);
      const rx = (_panelWp.x * 0.5 + 0.5) * window.innerWidth;
      const ry = (-_panelWp.y * 0.5 + 0.5) * window.innerHeight;
      _elAimReticle.style.left = rx + 'px';
      _elAimReticle.style.top  = ry + 'px';
      _elAimReticle.classList.add('visible');
      _elAimReticle.classList.add('locked');
      _elPrompt.style.left = rx + 'px';
      _elPrompt.style.top  = (ry - 36) + 'px';
      _elIprLabel.textContent = isMobile ? 'tap to focus' : 'focus';
      const iconEl = _elIprIcon;
      if (isMobile) {
        iconEl.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="rgba(255,210,120,0.95)" stroke-width="1.5" width="16" height="16"><circle cx="12" cy="12" r="7"/><circle cx="12" cy="12" r="2" fill="rgba(255,180,60,0.35)"/></svg>`;
      } else {
        iconEl.innerHTML = `<span style="font-family:Georgia,serif;font-size:9px;letter-spacing:0.05em;color:rgba(255,220,140,0.95)">spc</span>`;
      }
      _elPrompt.classList.add('visible');
    } else {
      _elAimReticle.classList.remove('visible');
      _elAimReticle.classList.remove('locked');
      _elPrompt.classList.remove('visible');
    }
  } else {
    _elAimReticle.classList.remove('visible');
    _elAimReticle.classList.remove('locked');
  }

  // ── EXHIBIT FOCUSED SLIDESHOW (arrows / WASD only while an image is in focus) ──
  if (exhibitFocusPhase === 'focused' && exhibitPanelN >= 2 && iCD <= 0) {
    const navL = keys['ArrowLeft'] || keys['KeyA'];
    const navR = keys['ArrowRight'] || keys['KeyD'];
    if (navL && !_exhibitNavLWas) { _exhibitFocusStep(-1); iCD = 0.28; }
    if (navR && !_exhibitNavRWas) { _exhibitFocusStep(1); iCD = 0.28; }
    _exhibitNavLWas = navL; _exhibitNavRWas = navR;
  } else {
    _exhibitNavLWas = false; _exhibitNavRWas = false;
  }

  // ── CRATE RECORD CYCLING (desktop up/down arrows while browsing the crate) ──
  const _crateBrowsable = cratePhase === 'browsing' && !crateFocusPhase && VINYL.records.length > 1;
  if (_crateBrowsable && !crateSwapPhase && !isMobile && iCD <= 0) {
    const navUp = keys['ArrowUp'];
    const navDn = keys['ArrowDown'];
    if (navUp && !_crateNavUpWas) { _startCrateSwap(-1); iCD = 0.28; }  // up = previous record
    if (navDn && !_crateNavDnWas) { _startCrateSwap(1);  iCD = 0.28; }  // down = next record
    _crateNavUpWas = navUp; _crateNavDnWas = navDn;
  } else {
    _crateNavUpWas = false; _crateNavDnWas = false;
  }

  // Desktop Escape — unfocus when zoomed in, otherwise dismiss (same as walking out of radius)
  if (escDown && !escWas && iCD <= 0) {
    if (exhibitFocusPhase === 'focused') {
      _startExhibitUnfocus();
      _elPrompt.classList.remove('visible');
      iCD = 0.35;
    } else if (crateFocusPhase === 'focused') {
      _startCrateUnfocus();
      _elPrompt.classList.remove('visible');
      iCD = 0.35;
    } else if (exhibitPhase && exhibitPhase !== 'closing') {
      _dismissExhibit();
      _elPrompt.classList.remove('visible');
      iCD = 0.3;
    } else if (cratePhase && cratePhase !== 'closing') {
      _dismissCrate();
      _elPrompt.classList.remove('visible');
      iCD = 0.3;
    } else if (crtPhase && crtPhase !== 'closing') {
      _dismissCrt();
      _elPrompt.classList.remove('visible');
      iCD = 0.3;
    }
  // Mobile tap to dismiss when nothing is aimed (desktop uses Escape above)
  } else if (eDown && !eWas && isMobile && iCD <= 0 && (
    (exhibitPhase === 'open' && !exhibitFocusPhase && !exhibitCanFocus) ||
    (cratePhase === 'browsing' && !crateFocusPhase && !crateCanFocus) ||
    (crtPhase === 'open')
  )) {
    if (exhibitPhase === 'open' && !exhibitFocusPhase && !exhibitCanFocus) _dismissExhibit();
    else if (crtPhase === 'open') _dismissCrt();
    else _dismissCrate();
    _elPrompt.classList.remove('visible');
    iCD = 0.3;
  // Focus the panel under the reticle
  } else if (eDown && !eWas && exhibitCanFocus && iCD <= 0) {
    _startExhibitFocus(exhibitAimedIdx);
    _elPrompt.classList.remove('visible');
    iCD = 0.35;
  // Mobile tap to return from focused view (desktop Escape unfocuses above)
  } else if (eDown && !eWas && isMobile && exhibitFocusPhase === 'focused' && iCD <= 0) {
    _startExhibitUnfocus();
    _elPrompt.classList.remove('visible');
    iCD = 0.35;
  // Bring the aimed record disc into focus
  } else if (eDown && !eWas && crateCanFocus && iCD <= 0) {
    _startCrateFocus(crateAimedDisc);
    _elPrompt.classList.remove('visible');
    _elAimReticle.classList.remove('visible', 'locked');
    iCD = 0.35;
  // Mobile tap to return focused disc to the crate
  } else if (eDown && !eWas && isMobile && crateFocusPhase === 'focused' && iCD <= 0) {
    _startCrateUnfocus();
    _elPrompt.classList.remove('visible');
    iCD = 0.35;
  // Normal floater interaction
  } else if(eDown&&!eWas&&near.ref&&iCD<=0){
    const f=near.ref;
    const ex = _exhibitByFloater.get(f);
    if (ex && !exhibitPhase && !cratePhase && !crtPhase) {
      _openExhibit(ex, player.position.x, player.position.z, yaw);
      iCD = 0.5;
    } else if (f === _crateFloater && !cratePhase && !exhibitPhase && !crtPhase) {
      _openCrate(player.position.x, player.position.z, yaw);
      iCD = 0.5;
    } else if (f === _crtFloater && !crtPhase && !exhibitPhase && !cratePhase) {
      _openCrt(player.position.x, player.position.z, yaw);
      iCD = 0.5;
    } else if (!ex && f !== _crateFloater && f !== _crtFloater) {
      showToast(f.message);
      if (!roomRevealed && f === floaters[0]) {
        roomRevealed = true;
        loadExhibitTextures(); // background-preload photos so the first exhibit open is instant
        _scheduleIdle(_preloadVinylAssets); // ensure the crate is warm too
      }
      if (tutStage === 4) _tutDismiss();
      iCD=1.0;
      let b=0;
      const burst=()=>{b+=0.04;f.mesh.scale.setScalar(1+Math.sin(b*Math.PI)*0.7);if(b<1)requestAnimationFrame(burst);else f.mesh.scale.setScalar(1);};
      burst();
      for(let i=0;i<14;i++){
        const a=(i/14)*Math.PI*2, p=pData[pIdx++%MAX_P];
        p.x=f.mesh.position.x+Math.cos(a)*0.6; p.y=f.mesh.position.y; p.z=f.mesh.position.z+Math.sin(a)*0.6; p.life=1;
      }
    }
  }
  eWas=eDown;
  escWas=escDown;
  if(iCD>0)iCD-=dt;

  // Exhibition animation tick
  if (exhibitPhase) {
    const _exhibitFocusUIHidden = exhibitFocusPhase === 'focusing' || exhibitFocusPhase === 'focused' || exhibitFocusPhase === 'switching';
    _elMmWrap.classList.toggle('focus-hidden', _exhibitFocusUIHidden);
    _elUi?.classList.toggle('focus-hidden', _exhibitFocusUIHidden);
    _jZone.classList.toggle('focus-hidden', _exhibitFocusUIHidden);
    if (!exhibitFocusPhase) exhibitAngle += dt * EXHIBIT_ORBIT_SPD;

    if (exhibitFocusPhase === 'focusing') {
      const fp = exhibitPlanes[exhibitFocusIdx];
      _refreshExhibitFocusTarget(fp.mesh);
      exhibitFocusT = Math.min(1, exhibitFocusT + dt / EXHIBIT_FOCUS_DUR);
      const s = exhibitFocusT * exhibitFocusT * (3 - 2 * exhibitFocusT);
      fp.mesh.visible = true;
      fp.mesh.position.lerpVectors(_focusFromPos, _focusToPos, s);
      _focusLerpQuat.slerpQuaternions(_focusFromQuat, _focusToQuat, s);
      fp.mesh.quaternion.copy(_focusLerpQuat);
      fp.mesh.scale.setScalar(_focusFromScale + (_focusToScale - _focusFromScale) * s);
      fp.mesh.renderOrder = 200;
      fp.mesh.material.opacity = 1;
      fp.mesh.material.transparent = false;
      exhibitPlanes.forEach((p, i) => {
        if (i === exhibitFocusIdx) return;
        p.mesh.material.transparent = true;
        p.mesh.material.opacity = Math.max(0, 1 - s * 1.2);
        p.mesh.visible = p.mesh.material.opacity > 0.04;
      });
      if (exhibitFocusT >= 1) { exhibitFocusPhase = 'focused'; _showExhibitFocusHints(); }
    } else if (exhibitFocusPhase === 'switching') {
      const fromMesh = exhibitPlanes[exhibitFocusIdx].mesh;
      const toMesh = exhibitPlanes[exhibitFocusSwitchTo].mesh;
      exhibitFocusT = Math.min(1, exhibitFocusT + dt / EXHIBIT_FOCUS_SWITCH_DUR);
      const s = exhibitFocusT * exhibitFocusT * (3 - 2 * exhibitFocusT);

      fromMesh.position.copy(_slideCenterPos).addScaledVector(_slideOff, -s);
      fromMesh.quaternion.copy(_slideCenterQuat);
      fromMesh.scale.setScalar(_slideFromScale);
      fromMesh.visible = true;
      fromMesh.renderOrder = 200;

      toMesh.position.copy(_slideCenterPos).addScaledVector(_slideOff, 1 - s);
      toMesh.quaternion.copy(_slideToQuat);
      toMesh.scale.setScalar(_slideToScale);
      toMesh.visible = true;
      toMesh.renderOrder = 201;
      toMesh.material.opacity = 1;
      toMesh.material.transparent = false;

      if (exhibitFocusT >= 1) {
        exhibitFocusIdx = exhibitFocusSwitchTo;
        exhibitFocusPhase = 'focused';
        exhibitFocusSwitchTo = -1;
        exhibitFocusT = 0;
        _refreshExhibitFocusTarget(toMesh);
        _applyExhibitFocusView(toMesh);
        fromMesh.visible = false;
        exhibitPlanes.forEach((p, i) => {
          if (i !== exhibitFocusIdx) p.mesh.visible = false;
        });
        _showExhibitFocusHints();
      }
    } else if (exhibitFocusPhase === 'focused') {
      const fp = exhibitPlanes[exhibitFocusIdx];
      _refreshExhibitFocusTarget(fp.mesh);
      _applyExhibitFocusView(fp.mesh);
      fp.mesh.visible = true;
      fp.mesh.material.opacity = 1;
      fp.mesh.material.transparent = false;
      exhibitPlanes.forEach((p, i) => {
        if (i !== exhibitFocusIdx) p.mesh.visible = false;
      });
    } else if (exhibitFocusPhase === 'unfocusing') {
      const tp = exhibitPlanes[exhibitFocusIdx];
      exhibitFocusT = Math.min(1, exhibitFocusT + dt / EXHIBIT_FOCUS_DUR);
      const s = exhibitFocusT * exhibitFocusT * (3 - 2 * exhibitFocusT);
      const a = _exhibitPanelAngle(exhibitFocusIdx);
      _focusToPos.set(
        exhibitCX + Math.sin(a) * EXHIBIT_ORBIT_R,
        2.0,
        exhibitCZ + Math.cos(a) * EXHIBIT_ORBIT_R
      );
      _focusHelper.position.copy(_focusToPos);
      _focusHelper.rotation.set(0, a + Math.PI, 0);
      _focusToQuat.copy(_focusHelper.quaternion);
      tp.mesh.position.lerpVectors(_focusFromPos, _focusToPos, s);
      _focusLerpQuat.slerpQuaternions(_focusFromQuat, _focusToQuat, s);
      tp.mesh.quaternion.copy(_focusLerpQuat);
      tp.mesh.scale.setScalar(_focusFromScale + (1 - _focusFromScale) * s);
      tp.mesh.renderOrder = Math.round(200 * (1 - s));
      tp.mesh.visible = true;
      tp.mesh.material.transparent = false;
      tp.mesh.material.opacity = 1;
      exhibitPlanes.forEach((p, i) => {
        if (i === exhibitFocusIdx) return;
        p.mesh.material.transparent = true;
        p.mesh.material.opacity = Math.min(1, s * 1.15);
        p.mesh.visible = p.mesh.material.opacity > 0.04;
        _applyExhibitPanelTransform(p, i, exhibitAngle);
        p.mesh.scale.setScalar(0.05 + s * 0.95);
      });
      if (exhibitFocusT >= 1) {
        tp.mesh.renderOrder = 0;
        exhibitFocusIdx = -1;
        exhibitFocusPhase = null;
        exhibitFocusT = 0;
        exhibitPlanes.forEach(p => {
          p.mesh.material.transparent = false;
          p.mesh.material.opacity = 1;
          p.mesh.renderOrder = 0;
        });
        _showExhibitHint();
      }
    } else {
      exhibitPlanes.forEach((p, i) => {
        const a = _exhibitPanelAngle(i);
        p.mesh.position.x = exhibitCX + Math.sin(a) * EXHIBIT_ORBIT_R;
        p.mesh.position.y = 2.0;
        p.mesh.position.z = exhibitCZ + Math.cos(a) * EXHIBIT_ORBIT_R;
        // Explicitly zero X/Z so no residual tilt from focus slerp survives.
        p.mesh.rotation.set(0, a + Math.PI, 0);
        p.mesh.scale.setScalar(1);
        p.mesh.material.transparent = false;
        p.mesh.material.opacity = 1;
        // Cull the cards that sit behind the camera (it trails the player by 4.6
        // units, just past the 4.5-unit orbit). Apply this during 'opening' too,
        // not only 'open', so the rear card never scales up through the camera as
        // the exhibit spins in — it simply stays hidden until the player turns.
        if (exhibitPhase === 'open' || exhibitPhase === 'opening') p.mesh.visible = Math.cos(a - yaw) > -0.6;
      });
    }

    if (exhibitPhase === 'opening') {
      exhibitT = Math.min(1, exhibitT + dt / EXHIBIT_OPEN_DUR);
      exhibitPlanes.forEach((p, i) => {
        const stagger = EXHIBIT_STAGGER[i] || EXHIBIT_STAGGER[EXHIBIT_STAGGER.length - 1];
        const elapsed = exhibitT * EXHIBIT_OPEN_DUR - stagger;
        const rem     = EXHIBIT_OPEN_DUR - stagger;
        const lt      = Math.max(0, Math.min(1, elapsed / rem));
        const s       = lt * lt * (3 - 2 * lt);
        p.mesh.scale.setScalar(0.05 + s * 0.95);
      });
      if (exhibitT >= 1) {
        exhibitPhase = 'open';
        _showExhibitHint();
      }
    } else if (exhibitPhase === 'closing') {
      exhibitT = Math.max(0, exhibitT - dt / EXHIBIT_CLOSE_DUR);
      const s = exhibitT * exhibitT * (3 - 2 * exhibitT);
      exhibitPlanes.forEach(p => { p.mesh.scale.setScalar(0.05 + s * 0.95); });
      if (exhibitT <= 0) _closeExhibit();
    }
  }

  // ── CRATE animation tick ──
  if (cratePhase) {
    if (cratePhase === 'opening') {
      crateT = Math.min(1, crateT + dt / CRATE_OPEN_DUR);
      const s = crateT * crateT * (3 - 2 * crateT);
      if (crateGroup) crateGroup.scale.setScalar(0.04 + s * 0.96);
      if (crateT >= 1) {
        cratePhase = 'browsing';
        _showCrateNav(true);
        _showCrateBrowseHint();
      }
    } else if (cratePhase === 'closing') {
      crateT = Math.max(0, crateT - dt / CRATE_CLOSE_DUR);
      const s = crateT * crateT * (3 - 2 * crateT);
      if (crateGroup) crateGroup.scale.setScalar(0.04 + s * 0.96);
      if (crateT <= 0) _closeCrate();
    }

    if (crateGroup) {
      crateGroup.position.y = CRATE_Y + Math.sin(t * 1.4) * 0.03;
    }

    // Hide the HUD while a disc is held in focus, just like the carousel
    const _crateFocusUIHidden = crateFocusPhase === 'focusing' || crateFocusPhase === 'focused';
    _elMmWrap.classList.toggle('focus-hidden', _crateFocusUIHidden);
    _elUi?.classList.toggle('focus-hidden', _crateFocusUIHidden);
    _jZone.classList.toggle('focus-hidden', _crateFocusUIHidden);
  }

  _tickCrateSwap(dt);
  _tickCrateFocus(dt);

  // ── CRT animation tick ──
  if (crtPhase) {
    if (crtPhase === 'opening') {
      crtT = Math.min(1, crtT + dt / CRATE_OPEN_DUR);
      const s = crtT * crtT * (3 - 2 * crtT);
      if (crtGroup) crtGroup.scale.setScalar(0.04 + s * 0.96);
      if (crtT >= 1) crtPhase = 'open';
    } else if (crtPhase === 'closing') {
      crtT = Math.max(0, crtT - dt / CRATE_CLOSE_DUR);
      const s = crtT * crtT * (3 - 2 * crtT);
      if (crtGroup) crtGroup.scale.setScalar(0.04 + s * 0.96);
      if (crtT <= 0) _closeCrt();
    }
    if (crtGroup) crtGroup.position.y = CRT_Y + Math.sin(t * 1.4) * 0.03;
    // Faint static glow — one scalar nudge + a cheap texture crawl (no array writes)
    if (CRT.screenMat) CRT.screenMat.emissiveIntensity = 0.5 + Math.sin(t * 40) * 0.12 + Math.sin(t * 7.3) * 0.06;
    if (CRT.staticTex) CRT.staticTex.offset.y = (t * 0.6) % 1;
  }

  _elKeySpace.classList.toggle('active', !!(near.ref && !exhibitOpen && !crateOpen && !crtOpen) || exhibitCanFocus || crateCanFocus);

  renderer.render(scene, camera);
  _tickTutPreview();
  _mmFrame++;
  if (!isMobile || _mmFrame % 3 === 0) drawMinimap();

  // Position guide dots at the orb's screen projection
  if ((tutStage <= 1 && _tutGuideDot.classList.contains('visible')) || _exhPanGuideOn) {
    const _orbWorld = new THREE.Vector3();
    orbMesh.getWorldPosition(_orbWorld);
    _orbWorld.project(camera);
    const sx = ( _orbWorld.x * 0.5 + 0.5) * window.innerWidth;
    const sy = (-_orbWorld.y * 0.5 + 0.5) * window.innerHeight;
    if (tutStage <= 1 && _tutGuideDot.classList.contains('visible')) {
      _tutGuideDot.style.left = (sx - 10) + 'px';
      _tutGuideDot.style.top  = (sy - 10) + 'px';
    }
    if (_exhPanGuideOn) {
      if (Math.abs(yaw - _exhPanGuideYaw0) > 0.12) _hideExhibitPanGuide();
      else {
        _exhPanWrap.style.left = sx + 'px';
        _exhPanWrap.style.top  = sy + 'px';
      }
    }
  }
}

window.addEventListener('resize', () => {
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  _applyDPR(true); // force: viewport genuinely changed, and keep the resize-skip cache in sync
});

animate();

// Warm the vinyl crate's procedural textures + box during idle so the first
// open is instant rather than stalling on the interact press.
_scheduleIdle(_preloadVinylAssets);

// ══════════════════════════════════════════
//  MINIMAP
// ══════════════════════════════════════════
const _mm     = document.getElementById('minimap');
const _mmCtx  = _mm.getContext('2d');
const _mmWrap = document.getElementById('minimap-wrap');
const MM_SIZE  = 120;  // canvas px
const MM_WORLD = 36;   // world units across the map
const MM_SCALE = MM_SIZE / MM_WORLD;
const MM_CX    = MM_SIZE / 2;
const MM_CY    = MM_SIZE / 2;
const MM_R     = MM_SIZE / 2 - 1;

function _mmPt(wx, wz) {
  return [ MM_CX + wx * MM_SCALE, MM_CY + wz * MM_SCALE ];
}

function drawMinimap() {
  if (!roomRevealed) return;
  if (!_mmWrap.classList.contains('visible')) _mmWrap.classList.add('visible');

  const ctx = _mmCtx;
  ctx.clearRect(0, 0, MM_SIZE, MM_SIZE);
  ctx.save();

  // Circular clip
  ctx.beginPath();
  ctx.arc(MM_CX, MM_CY, MM_R, 0, Math.PI * 2);
  ctx.clip();

  // Background
  ctx.fillStyle = 'rgba(4,2,1,0.82)';
  ctx.fillRect(0, 0, MM_SIZE, MM_SIZE);

  // Rotate entire world around canvas centre by player yaw
  // so "forward" is always up, GTA-style
  ctx.save();
  ctx.translate(MM_CX, MM_CY);
  ctx.rotate(yaw - Math.PI);   // forward (+Z) maps to canvas-down, so offset by π to flip it up
  ctx.translate(-MM_CX, -MM_CY);

  // Helper: world pos → canvas pos, relative to player (player = canvas centre)
  const toMM = (wx, wz) => [
    MM_CX + (wx - player.position.x) * MM_SCALE,
    MM_CY + (wz - player.position.z) * MM_SCALE
  ];

  // Room boundary
  ctx.strokeStyle = 'rgba(255,200,100,0.12)';
  ctx.lineWidth = 1;
  const [bx0, by0] = toMM(-23, -23);
  const [bx1, by1] = toMM( 23,  23);
  ctx.strokeRect(bx0, by0, bx1 - bx0, by1 - by0);

  // Floater dots
  floaters.forEach((f, i) => {
    const col = floaterData[i].color;
    const cr = (col >> 16) & 0xff;
    const cg = (col >>  8) & 0xff;
    const cb =  col        & 0xff;
    const [fx, fz] = toMM(f.mesh.position.x, f.mesh.position.z);
    ctx.beginPath();
    ctx.arc(fx, fz, 4.5, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${cr},${cg},${cb},0.18)`;
    ctx.fill();
    ctx.beginPath();
    ctx.arc(fx, fz, 2.2, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${cr},${cg},${cb},0.9)`;
    ctx.fill();
  });

  ctx.restore(); // end world rotation

  // Player — fixed upward-pointing triangle at canvas centre
  ctx.save();
  ctx.translate(MM_CX, MM_CY);
  ctx.beginPath();
  ctx.moveTo(0, -7);
  ctx.lineTo( 4, 4);
  ctx.lineTo(-4, 4);
  ctx.closePath();
  ctx.fillStyle = 'rgba(255,235,160,0.97)';
  ctx.shadowColor = 'rgba(255,180,60,0.9)';
  ctx.shadowBlur = 7;
  ctx.fill();
  ctx.restore();

  ctx.restore(); // end clip

  // Outer border ring
  ctx.beginPath();
  ctx.arc(MM_CX, MM_CY, MM_R, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(255,200,100,0.28)';
  ctx.lineWidth = 1;
  ctx.stroke();
}
</script>
</body>
