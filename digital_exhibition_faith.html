function _syncCamera() {
  const camX = player.position.x - Math.sin(yaw) * 4.6;
  const camZ = player.position.z - Math.cos(yaw) * 4.6;
  camera.position.lerp(_camTarget.set(camX, player.position.y + 3.1, camZ), 0.1);
  camera.lookAt(player.position.x, player.position.y + 1.6, player.position.z);
  camera.updateMatrixWorld();
}

function _exhibitPanelAngle(i) {
  return exhibitAngle + i * (Math.PI * 2 / exhibitPanelN);
}

function _exhibitFocusScale(panelW, panelH) {
  const dist = EXHIBIT_FOCUS_CAM_DIST;
  const vFov = (camera.fov * Math.PI) / 180;
  const visibleH = 2 * dist * Math.tan(vFov / 2);
  const visibleW = visibleH * camera.aspect;
  return Math.min(
    (visibleW * EXHIBIT_FOCUS_FILL) / panelW,
    (visibleH * EXHIBIT_FOCUS_FILL) / panelH
  );
}

function _computeExhibitFocusTarget(outPos, outQuat, panelW, panelH) {
  camera.getWorldDirection(_camLookDir);
  outPos.copy(camera.position).addScaledVector(_camLookDir, EXHIBIT_FOCUS_CAM_DIST);
  // Build a proper right-handed basis matching the camera's own axes so the panel
  // sits flush with the viewport. right × up = backward (det=+1); negating right
  // would flip the handedness to -1, breaking setFromRotationMatrix.
  _rgt.setFromMatrixColumn(camera.matrixWorld, 0);
  _fwd.setFromMatrixColumn(camera.matrixWorld, 1);
  _panelWp.copy(_camLookDir).negate();
  _focusBasis.makeBasis(_rgt, _fwd, _panelWp);
  outQuat.setFromRotationMatrix(_focusBasis);
  return _exhibitFocusScale(panelW, panelH);
}

function _computeVinylFocusTarget(outPos, outQuat, panelW, panelH) {
  const fs = _computeExhibitFocusTarget(outPos, outQuat, panelW, panelH);
  _fwd.setFromMatrixColumn(camera.matrixWorld, 1);
  outPos.addScaledVector(_fwd, VINYL_FOCUS_Y_OFF);
  return fs * VINYL_FOCUS_SCALE;
}

function _crateRecordFocusScale(rec) {
  return _vinylRecHasMedia(rec)
    ? _computeVinylFocusTarget(_focusToPos, _focusToQuat, RECORD_SIZE, RECORD_SIZE)
    : _computeExhibitFocusTarget(_focusToPos, _focusToQuat, RECORD_SIZE, RECORD_SIZE);
}

function _applyExhibitFocusView(mesh) {
  mesh.position.copy(_focusToPos);
  mesh.quaternion.copy(_focusToQuat);
  mesh.scale.setScalar(_focusToScale);
  mesh.renderOrder = 200;
}

function _captureExhibitFocusFrom(mesh) {
  mesh.getWorldPosition(_focusFromPos);
  _focusFromQuat.copy(mesh.quaternion);
  _focusFromScale = mesh.scale.x;
}

function _refreshExhibitFocusTarget(mesh) {
  const geo = mesh.geometry.parameters;
  _focusToScale = _computeExhibitFocusTarget(_focusToPos, _focusToQuat, geo.width, geo.height);
}

function _applyExhibitPanelTransform(p, i, orbitAngle) {
  const a = orbitAngle + i * (Math.PI * 2 / exhibitPanelN);
  p.mesh.position.x = exhibitCX + Math.sin(a) * EXHIBIT_ORBIT_R;
  p.mesh.position.y = 2.0;
  p.mesh.position.z = exhibitCZ + Math.cos(a) * EXHIBIT_ORBIT_R;
  // Use rotation.set to explicitly zero X and Z axes so no residual tilt from
  // the focus slerp animation carries over into the orbit state.
  p.mesh.rotation.set(0, a + Math.PI, 0);
}

function _exhibitStep(dir) {
  if (!exhibitPlanes || exhibitPhase !== 'open' || exhibitFocusPhase || exhibitPanelN < 2) return;
  exhibitAngle += dir * (Math.PI * 2 / exhibitPanelN);
}

function _exhibitFocusStep(dir) {
  if (!exhibitPlanes || exhibitFocusPhase !== 'focused' || exhibitPanelN < 2) return;
  const toIdx = (exhibitFocusIdx + dir + exhibitPanelN) % exhibitPanelN;
  exhibitFocusSwitchTo = toIdx;
  exhibitFocusPhase = 'switching';
  exhibitFocusT = 0;
  exhibitAngle += dir * (Math.PI * 2 / exhibitPanelN);

  const fromMesh = exhibitPlanes[exhibitFocusIdx].mesh;
  const toMesh = exhibitPlanes[toIdx].mesh;
  _syncCamera();
  const fromGeo = fromMesh.geometry.parameters;
  _computeExhibitFocusTarget(_slideCenterPos, _slideCenterQuat, fromGeo.width, fromGeo.height);
  _slideFromScale = fromMesh.scale.x;
  const toGeo = toMesh.geometry.parameters;
  _slideToScale = _exhibitFocusScale(toGeo.width, toGeo.height);
  _slideToQuat.copy(_slideCenterQuat);
  _rgt.setFromMatrixColumn(camera.matrixWorld, 0);
  _slideOff.copy(_rgt).multiplyScalar(2.6 * dir);

  fromMesh.visible = true;
  toMesh.visible = true;
  fromMesh.renderOrder = 200;
  toMesh.renderOrder = 201;
  exhibitPlanes.forEach((p, i) => {
    if (i !== exhibitFocusIdx && i !== toIdx) p.mesh.visible = false;
  });
}

function _hideExhibitNav() {
  _elExhibitPrev?.classList.remove('visible');
  _elExhibitNext?.classList.remove('visible');
}

function _showExhibitHint() {
  _elFocusEscapeHint.innerHTML = isMobile
    ? `<span class="feh-label">tap to focus</span>`
    : `<span class="feh-key">spc</span><span class="feh-label">focus</span><span class="feh-key">spc</span><span class="feh-label">close</span>`;
  _elFocusEscapeHint.classList.remove('dim');
  _elFocusEscapeHint.classList.add('visible');
  clearTimeout(_focusEscapeTimer);
  _focusEscapeTimer = setTimeout(() => _elFocusEscapeHint.classList.add('dim'), 3200);
  if (exhibitPanelN >= 2) {
    _elExhibitPrev?.classList.add('visible');
    _elExhibitNext?.classList.add('visible');
  } else {
    _hideExhibitNav();
  }
}

function _playerInExhibitOrbit() {
  const dx = player.position.x - exhibitCX;
  const dz = player.position.z - exhibitCZ;
  return dx * dx + dz * dz <= EXHIBIT_ORBIT_R2;
}

function _getAimedExhibitPanelIdx() {
  if (!exhibitPlanes || exhibitPhase !== 'open' || exhibitFocusPhase) return -1;
  if (!_playerInExhibitOrbit()) return -1;

  // Raycast first when a panel crosses the exact reticle
  _exhibitRayMeshes.length = 0;
  exhibitPlanes.forEach(p => {
    if (p.mesh.visible) _exhibitRayMeshes.push(p.mesh);
  });
  if (_exhibitRayMeshes.length) {
    _raycaster.setFromCamera(_ndcCenter, camera);
    const hits = _raycaster.intersectObjects(_exhibitRayMeshes, false);
    if (hits.length) return hits[0].object.userData.exhibitIdx;
  }

  // Inside the orbit: pick the visible panel nearest the screen centre
  const cx = window.innerWidth * 0.5;
  const cy = window.innerHeight * 0.5;
  let bestIdx = -1;
  let bestD2 = Infinity;
  exhibitPlanes.forEach((p, i) => {
    if (!p.mesh.visible) return;
    p.mesh.getWorldPosition(_panelWp);
    _panelWp.project(camera);
    if (_panelWp.z > 1) return;
    const sx = (_panelWp.x * 0.5 + 0.5) * window.innerWidth;
    const sy = (-_panelWp.y * 0.5 + 0.5) * window.innerHeight;
    const dx = sx - cx, dy = sy - cy;
    const d2 = dx * dx + dy * dy;
    if (d2 < bestD2) { bestD2 = d2; bestIdx = i; }
  });
  return bestIdx;
}

function _startExhibitFocus(idx) {
  if (!exhibitPlanes || idx < 0 || exhibitFocusPhase) return;
  const p = exhibitPlanes[idx];
  exhibitFocusIdx = idx;
  exhibitFocusPhase = 'focusing';
  exhibitFocusSwitchTo = -1;
  exhibitFocusT = 0;
  _hideFocusEscapeHint();
  _hideExhibitNav();
  _captureExhibitFocusFrom(p.mesh);
}

function _startExhibitUnfocus() {
  if (exhibitFocusPhase !== 'focused') return;
  _hideFocusEscapeHint();
  _hideExhibitNav();
  const p = exhibitPlanes[exhibitFocusIdx];
  _syncCamera();
  _refreshExhibitFocusTarget(p.mesh);
  _focusFromPos.copy(_focusToPos);
  _focusFromQuat.copy(_focusToQuat);
  _focusFromScale = _focusToScale;
  exhibitFocusPhase = 'unfocusing';
  exhibitFocusT = 0;
}

function _resetExhibitFocus() {
  _hideFocusEscapeHint();
  exhibitFocusIdx = -1;
  exhibitFocusPhase = null;
  exhibitFocusSwitchTo = -1;
  exhibitFocusT = 0;
  focusDimT = 0;
  if (exhibitPlanes) {
    exhibitPlanes.forEach(p => { p.mesh.renderOrder = 0; });
  }
}

function _setFloaterVisible(f, visible) {
  if (!f) return;
  f._hidden = !visible;
  f.mesh.visible = visible;
  f.aura.visible = visible;
  f.ring.visible = visible;
  f.fShadow.visible = visible;
  if (f.light) f.light.visible = visible;
  if (f.beam) f.beam.visible = visible;
  if (f.beamCone) f.beamCone.visible = visible;
}

function _restoreExhibitFloater() {
  if (exhibitTriggerFloater) {
    _setFloaterVisible(exhibitTriggerFloater, true);
    exhibitTriggerFloater = null;
  }
}

function _leaveExhibitRadius() {
  if (!exhibitTriggerFloater) return;
  const fp = exhibitTriggerFloater.mesh.position;
  const ldx = player.position.x - fp.x;
  const ldz = player.position.z - fp.z;
  if (ldx * ldx + ldz * ldz <= EXHIBIT_LEAVE_R2) return;

  if (exhibitPhase && exhibitPhase !== 'closing') {
    if (exhibitFocusPhase) {
      _resetExhibitFocus();
      if (exhibitPlanes) exhibitPlanes.forEach(p => { p.mesh.visible = true; p.mesh.material.opacity = 1; });
    }
    exhibitPhase = 'closing';
    _hideExhibitNav();
    _hideFocusEscapeHint();
    _restoreExhibitFloater();
  } else if (cratePhase && cratePhase !== 'closing') {
    if (crateFocusPhase === 'pulled' || crateFocusPhase === 'pulling') {
      const r = crateRecords[crateSelIdx];
      if (r && crateGroup && r.parent !== crateGroup) crateGroup.attach(r);
      crateFocusPhase = null;
      crateFocusT = 0;
    }
    _hideFocusEscapeHint();
    if (_elCrateBack) _elCrateBack.classList.remove('visible');
    cratePhase = 'closing';
    crateT = 1;
    _restoreExhibitFloater();
  }
}

function _openExhibit(ex, px, pz, openYaw) {
  if (exhibitPhase) return;
  _resetExhibitFocus();
  loadExhibitTextures(); // safety: ensure textures exist if opened before background preload
  // Boost to full resolution for the duration the cards are on screen
  _savedDPR = curDPR;
  curDPR = EXHIBIT_DPR;
  _applyDPR();
  exhibitOpen  = true;
  exhibitPhase = 'opening';
  exhibitT     = 0;
  exhibitPanelN = ex.textures.length + 1;
  exhibitAngle = openYaw - (exhibitPanelN - 1) * (Math.PI * 2 / exhibitPanelN);
  exhibitCX    = px;
  exhibitCZ    = pz;
  exhibitTriggerFloater = floaters[ex.floaterIdx];
  _setFloaterVisible(exhibitTriggerFloater, false);
  exhibitPlanes = Array.from({ length: exhibitPanelN }, (_, i) => {
    const a   = exhibitAngle + i * (Math.PI * 2 / exhibitPanelN);
    const tex = i < ex.textures.length ? ex.textures[i] : ex.cardTex;
    const { w: panelW, h: panelH } = _fitExhibitSize(_texAspect(tex));
    const geo = new THREE.PlaneGeometry(panelW, panelH);
    const mat = new THREE.MeshBasicMaterial({ map: tex, side: THREE.DoubleSide });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.userData.exhibitIdx = i;
    mesh.position.set(px + Math.sin(a) * EXHIBIT_ORBIT_R, 2.0, pz + Math.cos(a) * EXHIBIT_ORBIT_R);
    mesh.rotation.y = a + Math.PI;
    mesh.scale.setScalar(0.05);
    scene.add(mesh);

    // Frame: same size + FRAME_BORDER overhang, sits just behind image plane
    const frameGeo = new THREE.PlaneGeometry(panelW + FRAME_BORDER*2, panelH + FRAME_BORDER*2);
    const frameMat = new THREE.MeshBasicMaterial({
      map: _getExhibitFrameTex(panelW, panelH), transparent: true, side: THREE.DoubleSide,
      depthWrite: false, alphaTest: 0.01
    });
    const frameMesh = new THREE.Mesh(frameGeo, frameMat);
    frameMesh.position.z = -0.012; // slightly behind in local space
    mesh.add(frameMesh);

    return { mesh, geo, mat, frameGeo, frameMat };
  });
}

function _closeExhibit() {
  _resetExhibitFocus();
  _hideExhibitNav();
  _hideFocusEscapeHint();
  if (exhibitPlanes) {
    exhibitPlanes.forEach(p => {
      scene.remove(p.mesh);
      p.geo.dispose();
      p.mat.dispose();
      p.frameGeo.dispose();
      p.frameMat.dispose();
      // photo textures and frame texture are shared; don't dispose
    });
    exhibitPlanes = null;
  }
  // Restore the pre-exhibit resolution; the adaptive loop re-tunes from here
  curDPR = _savedDPR;
  _applyDPR();
  exhibitOpen  = false;
  exhibitPhase = null;
  exhibitT     = 0;
  _restoreExhibitFloater();
  iCD = 0.6;
}

// ══════════════════════════════════════════
//  VINYL CRATE
// ══════════════════════════════════════════
const _crateTgt = { z: 0, lean: 0, lift: 0 };
function _crateRecordTargets(i) {
  // Every record rests at the SAME back-lean and a fixed depth slot, so cycling never
  // rotates anything. Only the selected record moves: straight up on Y by RECORD_LIFT.
  const n = crateRecords.length || VINYL.records.length;
  const half = (n - 1) / 2;
  _crateTgt.z = (half - i) * CRATE_REC_SPACING;  // index 0 nearest the player, later indices sit further back
  _crateTgt.lean = RECORD_LEAN;                  // identical for all records -> no relative tilt
  _crateTgt.lift = (i === crateSelIdx) ? RECORD_LIFT : 0;
  return _crateTgt;
}

const CRATE_WOOD_TILE = 0.52;

function _crateFaceMat(faceW, faceH, horizontal) {
  const src = horizontal ? VINYL.crateWoodH : VINYL.crateWoodV;
  const map = src.map.clone();
  const bumpMap = src.bumpMap.clone();
  map.wrapS = map.wrapT = THREE.RepeatWrapping;
  bumpMap.wrapS = bumpMap.wrapT = THREE.RepeatWrapping;
  map.repeat.set(Math.max(1, faceW / CRATE_WOOD_TILE), Math.max(1, faceH / CRATE_WOOD_TILE));
  bumpMap.repeat.copy(map.repeat);
  return new THREE.MeshStandardMaterial({
    map, bumpMap, bumpScale: 0.052,
    roughness: 0.83, metalness: 0.015,
    color: 0x6e3020,
    side: THREE.DoubleSide,
  });
}

function _buildCrateBox() {
  const g = new THREE.Group();
  const innerW = RECORD_SIZE + 0.57;
  const depth  = RECORD_SIZE * 0.714;
  const tall   = RECORD_SIZE * 0.72;   // back/side wall height
  const front  = RECORD_SIZE * 0.4;    // shorter front wall so records stay visible
  const T  = CRATE_WALL_THICK;
  const BT = CRATE_BOTTOM_THICK;
  const outerW = innerW + T * 2;
  const outerD = depth + T * 2;
  const floorY = -tall / 2;
  const corner = T * 1.15;

  const bottomMat = _crateFaceMat(outerW, outerD, true);
  const backMat   = _crateFaceMat(outerW, tall, false);
  const frontMat  = _crateFaceMat(outerW, front, false);
  const sideMat   = _crateFaceMat(depth, tall, false);
  const railMat   = _crateFaceMat(outerW, T, false);
  const cornerMat = _crateFaceMat(corner, tall, false);

  const bottom = new THREE.Mesh(new THREE.BoxGeometry(outerW, BT, outerD), bottomMat);
  bottom.position.y = floorY - BT / 2;
  g.add(bottom);

  const back = new THREE.Mesh(new THREE.BoxGeometry(outerW, tall, T), backMat);
  back.position.set(0, 0, -depth / 2 - T / 2);
  g.add(back);

  const frontW = new THREE.Mesh(new THREE.BoxGeometry(outerW, front, T), frontMat);
  frontW.position.set(0, floorY + front / 2, depth / 2 + T / 2);
  g.add(frontW);

  const left = new THREE.Mesh(new THREE.BoxGeometry(T, tall, depth), sideMat);
  left.position.set(-innerW / 2 - T / 2, 0, 0);
  g.add(left);
  const right = new THREE.Mesh(new THREE.BoxGeometry(T, tall, depth), sideMat);
  right.position.set(innerW / 2 + T / 2, 0, 0);
  g.add(right);

  // Top rails — thicker lip along the upper edge of each wall panel.
  const backRail = new THREE.Mesh(new THREE.BoxGeometry(outerW, T, T), railMat);
  backRail.position.set(0, tall / 2 + T / 2, -depth / 2 - T / 2);
  g.add(backRail);

  const sideRailGeo = new THREE.BoxGeometry(T, T, depth + T * 2);
  const leftRail = new THREE.Mesh(sideRailGeo, railMat);
  leftRail.position.set(-innerW / 2 - T / 2, tall / 2 + T / 2, 0);
  g.add(leftRail);
  const rightRail = new THREE.Mesh(sideRailGeo, railMat);
  rightRail.position.set(innerW / 2 + T / 2, tall / 2 + T / 2, 0);
  g.add(rightRail);

  const frontRail = new THREE.Mesh(new THREE.BoxGeometry(outerW, T, T), railMat);
  frontRail.position.set(0, floorY + front + T / 2, depth / 2 + T / 2);
  g.add(frontRail);

  // Corner posts tie the frame together and sell the plank depth at every edge.
  [[-1, -1], [-1, 1], [1, -1], [1, 1]].forEach(([sx, sz]) => {
    const post = new THREE.Mesh(new THREE.BoxGeometry(corner, tall, corner), cornerMat);
    post.position.set(sx * (innerW / 2 + T / 2), 0, sz * (depth / 2 + T / 2));
    g.add(post);
  });

  g.userData.parts = [bottom, back, frontW, left, right, backRail, leftRail, rightRail, frontRail];
  g.userData.boxMats = [bottomMat, backMat, frontMat, sideMat, railMat, cornerMat];
  return g;
}

function _buildCrateRecord(rec) {
  const grp = new THREE.Group();

  const edgeMat = new THREE.MeshStandardMaterial({ color: 0x141414, roughness: 0.8, metalness: 0.0 });
  // Emissive map at low intensity keeps the art readable in the dim room without washing out.
  const coverMat = new THREE.MeshStandardMaterial({ map: rec.coverTex, emissive: 0xffffff, emissiveMap: rec.coverTex, emissiveIntensity: 0.4, roughness: 0.55, metalness: 0.0 });
  const backMat  = new THREE.MeshStandardMaterial({ map: rec.backTex, emissive: 0xffffff, emissiveMap: rec.backTex, emissiveIntensity: 0.4, roughness: 0.55, metalness: 0.0 });
  // BoxGeometry face order: +X,-X,+Y,-Y,+Z,-Z. Cover faces +Z (toward player), back -Z.
  const sleeveGeo = new THREE.BoxGeometry(RECORD_SIZE, RECORD_SIZE, RECORD_THICK);
  const sleeve = new THREE.Mesh(sleeveGeo, [edgeMat, edgeMat, edgeMat, edgeMat, coverMat, backMat]);
  grp.add(sleeve);

  const discGeo = new THREE.CircleGeometry(RECORD_SIZE * 0.46, 48);
  const discMat = new THREE.MeshBasicMaterial({ map: VINYL.discTex, transparent: true, side: THREE.DoubleSide, depthWrite: false });
  const disc = new THREE.Mesh(discGeo, discMat);
  disc.position.set(0, DISC_PEEK, -RECORD_THICK * 0.5 - 0.002);
  grp.add(disc);

  grp.userData = {
    sleeve, disc, sleeveGeo, discGeo,
    mats: [edgeMat, coverMat, backMat, discMat],
    lean: -0.5, z: -0.3, lift: 0, discOut: 0,
  };
  return grp;
}

function _openCrate(px, pz, openYaw) {
  if (cratePhase || exhibitPhase) return;
  _buildVinylAssets();
  _savedDPR = curDPR;
  curDPR = EXHIBIT_DPR;
  _applyDPR();

  crateOpen   = true;
  cratePhase  = 'opening';
  crateT      = 0;
  crateSelIdx = 0;
  crateFocusPhase = null;
  crateFocusT = 0;
  crateFlipT  = 0;
  crateFlipped = false;
  exhibitTriggerFloater = _crateFloater;
  _setFloaterVisible(exhibitTriggerFloater, false);

  crateGroup = new THREE.Group();
  // Place in front of the player, crate front (+Z local) facing the player/camera.
  _crateFwd.set(Math.sin(openYaw), 0, Math.cos(openYaw));
  crateGroup.position.set(px + _crateFwd.x * CRATE_DIST, CRATE_Y, pz + _crateFwd.z * CRATE_DIST);
  crateGroup.rotation.y = openYaw + Math.PI;
  scene.add(crateGroup);

  const box = _buildCrateBox();
  crateGroup.add(box);
  crateGroup.userData = { box };

  crateRecords = VINYL.records.map((rec, i) => {
    const grp = _buildCrateRecord(rec);
    const tgt = _crateRecordTargets(i);
    grp.userData.lean = tgt.lean;
    grp.userData.z = tgt.z;
    grp.userData.lift = tgt.lift;
    grp.position.set(0, RECORD_BASE_Y + tgt.lift, tgt.z);
    grp.rotation.x = tgt.lean;
    crateGroup.add(grp);
    return grp;
  });

  crateGroup.scale.setScalar(0.04);
}

function _disposeCrateObject(obj) {
  obj.traverse(o => {
    if (o.geometry) o.geometry.dispose();
    if (o.material) {
      const mats = Array.isArray(o.material) ? o.material : [o.material];
      // Shared VINYL textures (cover/back/disc/crate) are reused across opens — keep them.
      mats.forEach(m => m.dispose());
    }
  });
}

function _closeCrate() {
  _hideVinylMedia();
  if (crateRecords.length) {
    // Restore all sleeve visibility before disposal (overlay may have hidden them).
    crateRecords.forEach((r, i) => _setCrateSleeveVisible(i, true));
    // A pulled-out record may be parented to the scene; remove it explicitly.
    crateRecords.forEach(r => { if (r.parent && r.parent !== crateGroup) r.parent.remove(r); });
  }
  if (crateGroup) {
    _disposeCrateObject(crateGroup);
    scene.remove(crateGroup);
    crateGroup = null;
  }
  crateRecords = [];
  crateOpen   = false;
  cratePhase  = null;
  crateT      = 0;
  crateFocusPhase = null;
  crateFocusT = 0;
  crateSelIdx = 0;
  _hideFocusEscapeHint();
  if (_elCrateBack) _elCrateBack.classList.remove('visible');
  curDPR = _savedDPR;
  _applyDPR();
  _restoreExhibitFloater();
  iCD = 0.6;
}

function _crateStartClose() {
  if (cratePhase !== 'browsing' || crateFocusPhase) return;
  _hideFocusEscapeHint();
  cratePhase = 'closing';
  crateT = 1;
  _restoreExhibitFloater();
}

// Show or hide the 3D sleeve + disc for a record by index.
function _setCrateSleeveVisible(idx, visible) {
  const grp = crateRecords[idx];
  if (!grp) return;
  if (grp.userData.sleeve) grp.userData.sleeve.visible = visible;
  if (grp.userData.disc)   grp.userData.disc.visible   = visible;
}

// Show the SoundCloud embed overlaid directly on the 3D card face while browsing.
// Hides the 3D sleeve behind it so only the HTML card is visible.
// Called whenever the selected record changes or browsing begins/resumes.
function _syncCratePreview() {
  const rec = VINYL.records[crateSelIdx];
  if (_vinylRecHasMedia(rec)) {
    _setCrateSleeveVisible(crateSelIdx, false);
    _showVinylMedia(rec, true);
    _positionPanelOnCard();
  } else {
    _setCrateSleeveVisible(crateSelIdx, true);
    _hideVinylMedia();
  }
}

function _crateFlip(dir) {
  if (cratePhase !== 'browsing' || crateFocusPhase) return;
  // Restore the outgoing record's 3D sleeve before switching selection.
  _setCrateSleeveVisible(crateSelIdx, true);
  const n = crateRecords.length;
  crateSelIdx = Math.max(0, Math.min(n - 1, crateSelIdx + dir));
  _syncCratePreview();
}

function _cratePull() {
  if (cratePhase !== 'browsing' || crateFocusPhase) return;
  const r = crateRecords[crateSelIdx];
  // Restore the sleeve so it's visible during the pull-out flight animation.
  // It gets re-hidden by _showVinylMedia once the record is fully pulled.
  _setCrateSleeveVisible(crateSelIdx, true);
  _hideVinylMedia();
  scene.attach(r); // preserve world transform; animate in world space like exhibit focus
  r.getWorldPosition(_focusFromPos);
  _focusFromQuat.copy(r.quaternion);
  _focusFromScale = r.scale.x;
  crateFocusPhase = 'pulling';
  crateFocusT = 0;
  crateFlipT = 0;
  crateFlipped = false;
}

function _crateFlipFace() {
  if (crateFocusPhase !== 'pulled') return;
  const rec = VINYL.records[crateSelIdx];
  // Media records hand off to the player card: toggle its tabs instead of
  // physically flipping the (now hidden) 3D record. Others flip front/back.
  if (_vinylRecHasMedia(rec)) {
    _toggleVinylTab();
    return;
  }
  crateFlipped = !crateFlipped;
}

function _crateReturn() {
  if (crateFocusPhase !== 'pulled') return;
  _hideVinylMedia();
  _hideFocusEscapeHint();
  const r = crateRecords[crateSelIdx];
  // Restore the 3D record (hidden while the card was up) so it flies home.
  if (r.userData.sleeve) r.userData.sleeve.visible = true;
  if (r.userData.disc) r.userData.disc.visible = true;
  r.getWorldPosition(_focusFromPos);
  _focusFromQuat.copy(r.quaternion);
  _focusFromScale = r.scale.x;
  crateFocusPhase = 'returning';
  crateFocusT = 0;
}

function _crateBackAction() {
  if (crateFocusPhase === 'pulled') _crateReturn();
  else if (cratePhase === 'browsing' && !crateFocusPhase) _crateStartClose();
}

// Mobile frame-rate governor (caps to 60fps on high-refresh devices)
let _mobileAcc = 0;
const _MOBILE_TARGET = 1 / 60;
// Per-frame counters for throttled subsystems
let _moteFrame = 0;
let _mmFrame   = 0;

// ── ADAPTIVE RESOLUTION SCALING ──
// Measures the interval between processed frames and nudges the render DPR up/down
// to stay at ~60fps: lower fast when we drop frames, raise gently when steady.
let _lastFrameTs = performance.now();
let _emaFrameMs  = 1000 / 60;
let _drsFrame    = 0;
const _DRS_INTERVAL = 30; // evaluate ~twice per second
function _applyDPR() {
  renderer.setPixelRatio(curDPR);
  renderer.setSize(window.innerWidth, window.innerHeight);
}

// (tutorial handles initial guidance)

// Cached DOM references — queried once instead of every frame
const _elKeySpace    = document.getElementById('key-space');
const _elPrompt      = document.getElementById('interact-prompt');
const _elToast       = document.getElementById('toast');
const _elIprLabel    = document.getElementById('ipr-label');
const _elIprIcon     = document.getElementById('ipr-icon');
const _elAimReticle  = document.getElementById('aim-reticle');
const _elUi               = document.getElementById('ui');
const _elMmWrap           = document.getElementById('minimap-wrap');
const _elFocusEscapeHint  = document.getElementById('focus-escape-hint');
const _elCrateBack        = document.getElementById('crate-back-btn');
const _elExhibitPrev      = document.getElementById('exhibit-prev');
const _elExhibitNext      = document.getElementById('exhibit-next');
const _elVinylPanel       = document.getElementById('vinyl-media-panel');
const _elVmpTitle         = document.getElementById('vmp-title');
const _elVmpSubtitle      = document.getElementById('vmp-subtitle');
const _elVmpIframe        = document.getElementById('vmp-iframe');
const _elVmpNtsLink       = document.getElementById('vmp-nts-link');
const _elVmpPlayerView    = document.getElementById('vmp-player-view');
const _elVmpTracklistView = document.getElementById('vmp-tracklist-view');
const _elVmpTracklist     = document.getElementById('vmp-tracklist');
const _elVmpPreview       = document.getElementById('vmp-preview');
const _elVmpTabPlayer     = document.getElementById('vmp-tab-player');
const _elVmpTabTracklist  = document.getElementById('vmp-tab-tracklist');
let   _focusEscapeTimer   = null;
let   _currentVmpRec      = null;  // track loaded record to avoid iframe reloads

function _vinylRecHasMedia(rec) {
  return !!(rec && rec.soundcloudSrc);
}

let _vinylTab = 'player';

function _setVinylTab(tab) {
  if (!_elVmpPlayerView || !_elVmpTracklistView) return;
  _vinylTab = tab === 'tracklist' ? 'tracklist' : 'player';
  const onTracklist = _vinylTab === 'tracklist';
  _elVmpPlayerView.classList.toggle('active', !onTracklist);
  _elVmpTracklistView.classList.toggle('active', onTracklist);
  _elVmpTabPlayer.classList.toggle('active', !onTracklist);
  _elVmpTabTracklist.classList.toggle('active', onTracklist);
  _elVmpTabPlayer.setAttribute('aria-selected', String(!onTracklist));
  _elVmpTabTracklist.setAttribute('aria-selected', String(onTracklist));
}

function _toggleVinylTab() {
  _setVinylTab(_vinylTab === 'player' ? 'tracklist' : 'player');
}

// overlay=true  → bare iframe overlaid directly on the 3D card face (browse mode).
//                  Position is driven by _positionPanelOnCard() every frame.
// overlay=false → full centred panel (title + tabs + embed) shown when pulled out.
// Avoids reloading the SoundCloud iframe if the same record is already loaded.
function _showVinylMedia(rec, overlay) {
  if (!_elVinylPanel || !_vinylRecHasMedia(rec)) return;
  const sameRec = _currentVmpRec === rec;
  _currentVmpRec = rec;
  if (_elVmpPreview) _elVmpPreview.src = rec.coverUrl || '';
  _elVmpTitle.textContent = rec.title || '';
  _elVmpSubtitle.textContent = rec.subtitle || '';
  if (!sameRec) {
    _elVmpIframe.src = rec.soundcloudSrc;
    _elVmpNtsLink.href = rec.ntsUrl || '#';
    _elVmpTracklist.innerHTML = '';
    if (rec.tracklist) {
      rec.tracklist.forEach(tr => {
        const li = document.createElement('li');
        const time = document.createElement('span');
        time.className = 'vmp-time';
        time.textContent = tr.time || '';
        const artist = document.createElement('span');
        artist.className = 'vmp-artist';
        artist.textContent = tr.artist || '';
        const track = document.createElement('span');
        track.className = 'vmp-track';
        track.textContent = tr.title || '';
        li.append(time, artist, track);
        _elVmpTracklist.appendChild(li);
      });
    }
    if (!overlay) _setVinylTab('player');
  }
  if (overlay) {
    _elVinylPanel.classList.add('card-overlay');
  } else {
    // Promote: clear overlay inline styles, restore full centred panel.
    _elVinylPanel.classList.remove('card-overlay');
    _elVinylPanel.style.left = '';
    _elVinylPanel.style.top = '';
    _elVinylPanel.style.width = '';
    _elVinylPanel.style.height = '';
    _elVinylPanel.style.transform = '';
  }
  _elVinylPanel.classList.add('visible');
  _elVinylPanel.setAttribute('aria-hidden', 'false');
}

// Projects the selected record's world centre to screen space and sizes the
// overlay panel to match the card face. Called every frame while card-overlay.
function _positionPanelOnCard() {
  if (!crateRecords.length || !_elVinylPanel) return;
  const rec3d = crateRecords[crateSelIdx];
  if (!rec3d) return;

  // Centre of card
  rec3d.getWorldPosition(_previewV1);
  _previewV2.copy(_previewV1).project(camera);
  const sx = (_previewV2.x + 1) * 0.5 * window.innerWidth;
  const sy = (1 - _previewV2.y) * 0.5 * window.innerHeight;

  // Top edge of card to measure screen-space half-height
  _previewV1.y += RECORD_SIZE * 0.5;
  _previewV1.project(camera);
  const sy2 = (1 - _previewV1.y) * 0.5 * window.innerHeight;
  const cardPx = Math.abs(sy - sy2) * 2;

  _elVinylPanel.style.left   = sx + 'px';
  _elVinylPanel.style.top    = sy + 'px';
  _elVinylPanel.style.width  = cardPx + 'px';
  _elVinylPanel.style.height = cardPx + 'px';
  _elVinylPanel.style.transform = 'translate(-50%, -50%)';
}

function _hideVinylMedia() {
  if (!_elVinylPanel) return;
  _currentVmpRec = null;
  _elVinylPanel.classList.remove('visible', 'card-overlay');
  _elVinylPanel.style.left = '';
  _elVinylPanel.style.top = '';
  _elVinylPanel.style.width = '';
  _elVinylPanel.style.height = '';
  _elVinylPanel.style.transform = '';
  _elVinylPanel.setAttribute('aria-hidden', 'true');
  if (_elVmpIframe) _elVmpIframe.src = '';
  _setVinylTab('player');
}

if (_elVmpTabPlayer) _elVmpTabPlayer.addEventListener('click', () => _setVinylTab('player'));
if (_elVmpTabTracklist) _elVmpTabTracklist.addEventListener('click', () => _setVinylTab('tracklist'));

function _showFocusEscapeHint() {
  _elFocusEscapeHint.innerHTML = isMobile
    ? `<span class="feh-label">tap to return</span>`
    : `<span class="feh-key">spc</span><span class="feh-label">back</span>`;
  _elFocusEscapeHint.classList.remove('dim');
  _elFocusEscapeHint.classList.add('visible');
  clearTimeout(_focusEscapeTimer);
  _focusEscapeTimer = setTimeout(() => _elFocusEscapeHint.classList.add('dim'), 2800);
}

function _hideFocusEscapeHint() {
  clearTimeout(_focusEscapeTimer);
  _elFocusEscapeHint.classList.remove('visible', 'dim');
}

function _showCrateHint(state) {
  const rec = VINYL.records[crateSelIdx];
  const hasMedia = _vinylRecHasMedia(rec);
  if (state === 'pulled') {
    _elFocusEscapeHint.innerHTML = isMobile
      ? `<span class="feh-label">tap to ${hasMedia ? 'switch tabs' : 'flip sleeve'}</span>`
      : `<span class="feh-key">spc</span><span class="feh-label">${hasMedia ? 'player / tracklist' : 'flip'}</span><span class="feh-key">esc</span><span class="feh-label">back</span>`;
  } else { // browsing
    _elFocusEscapeHint.innerHTML = isMobile
      ? `<span class="feh-label">swipe to dig</span><span class="feh-label" style="opacity:0.4">&middot;</span><span class="feh-label">tap to lift</span>`
      : `<span class="feh-key">&larr; &rarr;</span><span class="feh-label">dig</span><span class="feh-key">spc</span><span class="feh-label">lift</span><span class="feh-key">esc</span><span class="feh-label">close</span>`;
  }
  _elFocusEscapeHint.classList.remove('dim');
  _elFocusEscapeHint.classList.add('visible');
  clearTimeout(_focusEscapeTimer);
  if (_elCrateBack) _elCrateBack.classList.add('visible');
}

if (_elCrateBack) {
  const _crateBackFire = e => { e.preventDefault(); e.stopPropagation(); _crateBackRequested = true; };
  _elCrateBack.addEventListener('click', _crateBackFire);
  _elCrateBack.addEventListener('touchstart', _crateBackFire, { passive: false });
}

const _exhibitNavFire = (dir, e) => {
  e.preventDefault();
  e.stopPropagation();
  if (exhibitFocusPhase === 'focused') _exhibitFocusStep(dir);
  else if (exhibitPhase === 'open' && !exhibitFocusPhase) _exhibitStep(dir);
};
if (_elExhibitPrev) {
  _elExhibitPrev.addEventListener('click', e => _exhibitNavFire(-1, e));
  _elExhibitPrev.addEventListener('touchstart', e => _exhibitNavFire(-1, e), { passive: false });
  _elExhibitPrev.addEventListener('touchmove', e => { e.stopPropagation(); }, { passive: false });
}
if (_elExhibitNext) {
  _elExhibitNext.addEventListener('click', e => _exhibitNavFire(1, e));
  _elExhibitNext.addEventListener('touchstart', e => _exhibitNavFire(1, e), { passive: false });
  _elExhibitNext.addEventListener('touchmove', e => { e.stopPropagation(); }, { passive: false });
}

function animate() {
  requestAnimationFrame(animate);
  const rawDt = clock.getDelta();
  // On mobile: accumulate time and only update/render at ~60fps
  if (isMobile) {
    _mobileAcc += rawDt;
    if (_mobileAcc < _MOBILE_TARGET) return;
  }
  const dt = Math.min(isMobile ? _mobileAcc : rawDt, 0.05);
  if (isMobile) _mobileAcc = 0;
  const t  = clock.elapsedTime;

  // Adaptive resolution: track the processed-frame interval and retune DPR periodically.
  const _nowTs = performance.now();
  _emaFrameMs = _emaFrameMs * 0.9 + (_nowTs - _lastFrameTs) * 0.1;
  _lastFrameTs = _nowTs;
  // Paused while an exhibit is open so an FPS dip can't claw back card resolution
  if (!exhibitPhase && !crateOpen && ++_drsFrame >= _DRS_INTERVAL) {
    _drsFrame = 0;
    const fps = 1000 / _emaFrameMs;
    if (fps < 54 && curDPR > MIN_DPR) {            // dropping frames — back off resolution fast
      curDPR = Math.max(MIN_DPR, curDPR - 0.2); _applyDPR();
    } else if (fps > 58.5 && curDPR < MAX_DPR) {   // steady 60 — climb toward max gently
      curDPR = Math.min(MAX_DPR, curDPR + 0.1); _applyDPR();
    }
  }

  _fwd.set(Math.sin(yaw), 0, Math.cos(yaw));
  _rgt.set(-Math.cos(yaw), 0, Math.sin(yaw));
  let moving = false;
  const _exhibitLocked = exhibitFocusPhase === 'focusing' || exhibitFocusPhase === 'focused' || exhibitFocusPhase === 'switching';
  // The crate is a focused interaction — freeze movement and turning while it is open.
  const _inputLocked = _exhibitLocked || crateOpen;

  // Arrow keys rotate camera — frozen while reading a focused panel / crate
  if (!_inputLocked) {
    if(keys['ArrowLeft'])  yaw += CAM_TURN * dt;
    if(keys['ArrowRight']) yaw -= CAM_TURN * dt;
  }

  // WASD moves
  if (!_inputLocked) {
    if(keys['KeyW']) { player.position.addScaledVector(_fwd, SPEED*dt); moving=true; }
    if(keys['KeyS']) { player.position.addScaledVector(_fwd,-SPEED*dt); moving=true; }
    if(keys['KeyA']) { player.position.addScaledVector(_rgt,-SPEED*dt); moving=true; }
    if(keys['KeyD']) { player.position.addScaledVector(_rgt, SPEED*dt); moving=true; }
  }

  // Virtual joystick movement
  if (!_inputLocked && _joy.active && (Math.abs(_joy.dx) > 8 || Math.abs(_joy.dy) > 8)) {
    player.position.addScaledVector(_rgt,  (_joy.dx / JR) * SPEED * dt);
    player.position.addScaledVector(_fwd, -(_joy.dy / JR) * SPEED * dt);
    moving = true;
  }

  player.position.x = Math.max(-BOUND, Math.min(BOUND, player.position.x));
  player.position.z = Math.max(-BOUND, Math.min(BOUND, player.position.z));
  player.position.y = 0;

  // Orb pulse
  const pulse = 1 + Math.sin(t*2.7)*0.06;
  orbMesh.scale.setScalar(pulse);

  // Room reveal — progress from 0 (dark) to 1 (fully lit) after first interaction
  if (roomRevealed && revealT < 1) revealT = Math.min(1, revealT + dt * 0.32);
  const _rSmooth = revealT * revealT * (3 - 2 * revealT); // smoothstep
  const _wantFocusDim = exhibitFocusPhase === 'focusing' || exhibitFocusPhase === 'focused' || exhibitFocusPhase === 'switching' ? 1 : 0;
  focusDimT += (_wantFocusDim - focusDimT) * Math.min(1, dt * 5.5);
  const _roomLight = _rSmooth * (1 - focusDimT * 0.94);
  ambientLight.intensity    = _roomLight * 0.15;
  beamLight.intensity       = Math.max(0, 1 - _rSmooth * 2.5) * 6.0 * (1 - focusDimT);
  beamCone.material.opacity = Math.max(0, 1 - _rSmooth * 2.5) * 0.045 * (1 - focusDimT);
  scene.fog.density         = FOG_BASE + focusDimT * 0.11;

  // Remaining floater beams fade IN with the reveal
  floaters.forEach((f, i) => {
    if (i === 0 || !f.beam) return;
    f.beam.intensity = _roomLight * 6.0;
    f.beamCone.material.opacity = _roomLight * 0.045;
  });

  const _orbDim = 1 - focusDimT * 0.82;
  orbLight.intensity    = (12.0 + Math.sin(t*2.4)*1.2) * _orbDim;
  fillLight.intensity   = (0.45 + Math.sin(t*1.8+1)*0.06) * _orbDim;
  featherLight.intensity= (0.15 + Math.sin(t*1.3+2)*0.02) * _orbDim;

  // Blob shadow follows orb
  blobShadow.position.x = player.position.x;
  blobShadow.position.z = player.position.z;
  blobShadow.material.opacity = 0.72 - Math.sin(t*2.7)*0.08;

  // Dust motes drift around player — throttled to every 2nd frame on all platforms
  _moteFrame++;
  if (_moteFrame % 2 === 0) {
    for(let i=0;i<MOTE_N;i++){
      motePhase[i] += dt*0.04;
      motePos[i*3]   = player.position.x + Math.sin(motePhase[i]*1.1+i*0.7)*10;
      motePos[i*3+1] = 0.25 + Math.abs(Math.sin(motePhase[i]*0.6+i*0.4))*3.5;
      motePos[i*3+2] = player.position.z + Math.cos(motePhase[i]*0.9+i*0.3)*10;
    }
    moteGeo.attributes.position.needsUpdate = true;
  }

  // Particle trail
  if(moving){ spawnAcc+=dt; if(spawnAcc>0.055){spawnP(player.position.x,player.position.z);spawnAcc=0;} }
  tickP(dt);

  // Tutorial step advancement
  if (tutStage === 2 && moving) _tutShow(3);

  // Floaters
  near.ref=null; near.dist=Infinity;
  floaters.forEach(f => {
    f.phase += dt;
    const floatY = Math.sin(f.phase*1.3)*0.14;
    f.mesh.position.y = f.baseY + floatY;
    f.mesh.rotation.x += f.rotSpeed;
    f.mesh.rotation.y += f.rotSpeed*1.4;
    if (f.light) f.light.position.copy(f.mesh.position);

    // Aura tracks main mesh exactly
    f.aura.position.copy(f.mesh.position);
    f.aura.rotation.copy(f.mesh.rotation);

    // Orbit ring spins on its own tilted axes
    f.ring.position.copy(f.mesh.position);
    f.ring.rotation.y += f.rotSpeed * 0.75;
    f.ring.rotation.z += f.rotSpeed * 0.45;

    // Shadow disc: tracks X/Z, opacity deepens as floater descends
    f.fShadow.position.x = f.mesh.position.x;
    f.fShadow.position.z = f.mesh.position.z;
    f.fShadow.material.opacity = 0.4 - floatY * 0.8;

    const dx=player.position.x-f.mesh.position.x, dz=player.position.z-f.mesh.position.z;
    const dist2=dx*dx+dz*dz;
    // Only sqrt when within influence radius (dist < 5 → dist2 < 25); saves 9 sqrts/frame when far
    const prox=dist2<25 ? Math.max(0,1-Math.sqrt(dist2)/5) : 0;
    f.mesh.material.emissiveIntensity = (1.4 + prox * 3.2) * _rSmooth;
    f.aura.material.opacity = (0.07 + prox * 0.15) * _rSmooth;
    f.ring.material.opacity  = (0.36 + prox * 0.28) * _rSmooth;
    const _lightI = (0.9 + prox * 2.2) * _rSmooth;
    if (f.light) f.light.intensity = _lightI; // desktop: per-floater light
    f._lightI = _lightI;                       // mobile: consumed by the shared pool
    f._dist2  = dist2;

    if(!f._hidden && dist2<near.dist){ near.dist=dist2; if(dist2<EXHIBIT_TRIGGER_R2)near.ref=f; }
    // Advance tutorial when player reaches the octahedron
    if (tutStage === 3 && f === floaters[0] && dist2 < 7.84) _tutShow(4);
  });

  // Mobile: drive the shared light pool from the nearest floaters
  if (isMobile) {
    const _nearest = floaters.filter(f => !f._hidden).slice().sort((a, b) => a._dist2 - b._dist2);
    for (let i = 0; i < _mobileLights.length; i++) {
      const pl = _mobileLights[i];
      const f  = _nearest[i];
      if (f) {
        pl.position.copy(f.mesh.position);
        pl.color.setHex(f.color);
        pl.intensity = f._lightI;
      } else {
        pl.intensity = 0;
      }
    }
  }

  // Auto-close exhibit/crate when player walks away from the trigger floater
  _leaveExhibitRadius();

  // Interact
  const eDown=keys['KeyE']||keys['Space'];

  // Camera — sync early so raycasts and screen projections match the rendered view
  _syncCamera();

  const exhibitAimable = exhibitPhase === 'open' && !exhibitFocusPhase;
  const exhibitAimedIdx = exhibitAimable ? _getAimedExhibitPanelIdx() : -1;
  let exhibitCanFocus = exhibitAimedIdx >= 0;

  // Proximity prompt — project above the near object (hidden while exhibit is open)
  if (near.ref && tutStage >= 3 && iCD <= 0 && !exhibitOpen && !crateOpen && !_elToast.classList.contains('visible')) {
    const _wp = new THREE.Vector3();
    near.ref.mesh.getWorldPosition(_wp);
    _wp.y += 0.55; // offset just above object
    _wp.project(camera);
    const px = ( _wp.x * 0.5 + 0.5) * window.innerWidth;
    const py = (-_wp.y * 0.5 + 0.5) * window.innerHeight;
    _elPrompt.style.left = px + 'px';
    _elPrompt.style.top  = py + 'px';
    if (!_elPrompt.classList.contains('visible')) {
      _elIprLabel.textContent = isMobile ? 'tap' : 'interact';
      const iconEl = _elIprIcon;
      if (isMobile) {
        iconEl.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="rgba(255,210,120,0.95)" stroke-width="1.5" width="16" height="16"><path d="M12 3v2M12 19v2M3 12H1M23 12h-2M18.36 5.64l-1.41 1.41M7.05 16.95l-1.41 1.41M18.36 18.36l-1.41-1.41M7.05 7.05L5.64 5.64"/><circle cx="12" cy="12" r="4" fill="rgba(255,180,60,0.15)"/></svg>`;
      } else {
        iconEl.innerHTML = `<span style="font-family:Georgia,serif;font-size:9px;letter-spacing:0.05em;color:rgba(255,220,140,0.95)">spc</span>`;
      }
      _elPrompt.classList.add('visible');
    }
  } else {
    _elPrompt.classList.remove('visible');
  }

  // Exhibit aim reticle — only visible when the aim is locked onto a panel
  if (exhibitPhase === 'open' && !exhibitFocusPhase) {
    if (exhibitCanFocus) {
      const tp = exhibitPlanes[exhibitAimedIdx].mesh;
      tp.getWorldPosition(_panelWp);
      _panelWp.project(camera);
      const rx = (_panelWp.x * 0.5 + 0.5) * window.innerWidth;
      const ry = (-_panelWp.y * 0.5 + 0.5) * window.innerHeight;
      _elAimReticle.style.left = rx + 'px';
      _elAimReticle.style.top  = ry + 'px';
      _elAimReticle.classList.add('visible');
      _elAimReticle.classList.add('locked');
      _elPrompt.style.left = rx + 'px';
      _elPrompt.style.top  = (ry - 36) + 'px';
      _elIprLabel.textContent = isMobile ? 'tap to focus' : 'focus';
      const iconEl = _elIprIcon;
      if (isMobile) {
        iconEl.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="rgba(255,210,120,0.95)" stroke-width="1.5" width="16" height="16"><circle cx="12" cy="12" r="7"/><circle cx="12" cy="12" r="2" fill="rgba(255,180,60,0.35)"/></svg>`;
      } else {
        iconEl.innerHTML = `<span style="font-family:Georgia,serif;font-size:9px;letter-spacing:0.05em;color:rgba(255,220,140,0.95)">spc</span>`;
      }
      _elPrompt.classList.add('visible');
    } else {
      _elAimReticle.classList.remove('visible');
      _elAimReticle.classList.remove('locked');
      _elPrompt.classList.remove('visible');
    }
  } else {
    _elAimReticle.classList.remove('visible');
    _elAimReticle.classList.remove('locked');
  }

  // ── CRATE NAVIGATION (flip through records) ──
  if (cratePhase === 'browsing' && !crateFocusPhase) {
    const navL = keys['ArrowLeft'] || keys['KeyA'];
    const navR = keys['ArrowRight'] || keys['KeyD'];
    if (navL && !_crateNavLWas) _crateFlip(-1);
    if (navR && !_crateNavRWas) _crateFlip(1);
    _crateNavLWas = navL; _crateNavRWas = navR;
  } else {
    _crateNavLWas = false; _crateNavRWas = false;
  }

  // ── EXHIBIT FOCUSED SLIDESHOW (arrows / WASD only while an image is in focus) ──
  if (exhibitFocusPhase === 'focused' && exhibitPanelN >= 2 && iCD <= 0) {
    const navL = keys['ArrowLeft'] || keys['KeyA'];
    const navR = keys['ArrowRight'] || keys['KeyD'];
    if (navL && !_exhibitNavLWas) { _exhibitFocusStep(-1); iCD = 0.28; }
    if (navR && !_exhibitNavRWas) { _exhibitFocusStep(1); iCD = 0.28; }
    _exhibitNavLWas = navL; _exhibitNavRWas = navR;
  } else {
    _exhibitNavLWas = false; _exhibitNavRWas = false;
  }

  // ── CRATE BACK / CLOSE (Esc or B, or on-screen button) ──
  const _crateBackKey = !!(keys['Escape'] || keys['KeyB']);
  if (crateOpen && iCD <= 0 && ((_crateBackKey && !_crateBackWas) || _crateBackRequested)) {
    _crateBackAction();
    iCD = 0.35;
  }
  _crateBackWas = _crateBackKey;
  _crateBackRequested = false;

  // Crate: lift the centred record out of the bin
  if (eDown && !eWas && cratePhase === 'browsing' && !crateFocusPhase && iCD <= 0) {
    _cratePull();
    iCD = 0.35;
  // Crate: flip the pulled record between front cover and back/tracklist
  } else if (eDown && !eWas && crateFocusPhase === 'pulled' && iCD <= 0) {
    _crateFlipFace();
    iCD = 0.3;
  // Dismiss exhibition — only when orbiting and nothing is aimed
  } else if (eDown && !eWas && exhibitPhase === 'open' && !exhibitFocusPhase && !exhibitCanFocus) {
    exhibitPhase = 'closing';
    _hideExhibitNav();
    _hideFocusEscapeHint();
    exhibitPlanes.forEach(p => { p.mesh.visible = true; p.mesh.material.opacity = 1; });
    _restoreExhibitFloater();
    iCD = 0.3;
  // Focus the panel under the reticle
  } else if (eDown && !eWas && exhibitCanFocus && iCD <= 0) {
    _startExhibitFocus(exhibitAimedIdx);
    _elPrompt.classList.remove('visible');
    iCD = 0.35;
  // Return from focused view to the carousel
  } else if (eDown && !eWas && exhibitFocusPhase === 'focused' && iCD <= 0) {
    _startExhibitUnfocus();
    _elPrompt.classList.remove('visible');
    iCD = 0.35;
  // Normal floater interaction
  } else if(eDown&&!eWas&&near.ref&&iCD<=0){
    const f=near.ref;
    const ex = _exhibitByFloater.get(f);
    if (ex && !exhibitPhase) {
      _openExhibit(ex, player.position.x, player.position.z, yaw);
      iCD = 0.5;
    } else if (f === _crateFloater && !cratePhase && !exhibitPhase) {
      _openCrate(player.position.x, player.position.z, yaw);
      _showCrateHint('browsing');
      iCD = 0.5;
    } else if (!ex && f !== _crateFloater) {
      showToast(f.message);
      if (!roomRevealed && f === floaters[0]) {
        roomRevealed = true;
        loadExhibitTextures(); // background-preload photos so the first exhibit open is instant
      }
      if (tutStage === 4) _tutDismiss();
      iCD=1.0;
      let b=0;
      const burst=()=>{b+=0.04;f.mesh.scale.setScalar(1+Math.sin(b*Math.PI)*0.7);if(b<1)requestAnimationFrame(burst);else f.mesh.scale.setScalar(1);};
      burst();
      for(let i=0;i<14;i++){
        const a=(i/14)*Math.PI*2, p=pData[pIdx++%MAX_P];
        p.x=f.mesh.position.x+Math.cos(a)*0.6; p.y=f.mesh.position.y; p.z=f.mesh.position.z+Math.sin(a)*0.6; p.life=1;
      }
    }
  }
  eWas=eDown;
  if(iCD>0)iCD-=dt;

  // Exhibition animation tick
  if (exhibitPhase) {
    const _exhibitFocusUIHidden = exhibitFocusPhase === 'focusing' || exhibitFocusPhase === 'focused' || exhibitFocusPhase === 'switching';
    _elMmWrap.classList.toggle('focus-hidden', _exhibitFocusUIHidden);
    _elUi?.classList.toggle('focus-hidden', _exhibitFocusUIHidden);
    _jZone.classList.toggle('focus-hidden', _exhibitFocusUIHidden);
    if (_exhibitFocusUIHidden) _hideExhibitNav();

    if (!exhibitFocusPhase) exhibitAngle += dt * EXHIBIT_ORBIT_SPD;

    if (exhibitFocusPhase === 'focusing') {
      const fp = exhibitPlanes[exhibitFocusIdx];
      _refreshExhibitFocusTarget(fp.mesh);
      exhibitFocusT = Math.min(1, exhibitFocusT + dt / EXHIBIT_FOCUS_DUR);
      const s = exhibitFocusT * exhibitFocusT * (3 - 2 * exhibitFocusT);
      fp.mesh.visible = true;
      fp.mesh.position.lerpVectors(_focusFromPos, _focusToPos, s);
      _focusLerpQuat.slerpQuaternions(_focusFromQuat, _focusToQuat, s);
      fp.mesh.quaternion.copy(_focusLerpQuat);
      fp.mesh.scale.setScalar(_focusFromScale + (_focusToScale - _focusFromScale) * s);
      fp.mesh.renderOrder = 200;
      fp.mesh.material.opacity = 1;
      fp.mesh.material.transparent = false;
      exhibitPlanes.forEach((p, i) => {
        if (i === exhibitFocusIdx) return;
        p.mesh.material.transparent = true;
        p.mesh.material.opacity = Math.max(0, 1 - s * 1.2);
        p.mesh.visible = p.mesh.material.opacity > 0.04;
      });
      if (exhibitFocusT >= 1) { exhibitFocusPhase = 'focused'; _showFocusEscapeHint(); }
    } else if (exhibitFocusPhase === 'switching') {
      const fromMesh = exhibitPlanes[exhibitFocusIdx].mesh;
      const toMesh = exhibitPlanes[exhibitFocusSwitchTo].mesh;
      exhibitFocusT = Math.min(1, exhibitFocusT + dt / EXHIBIT_FOCUS_SWITCH_DUR);
      const s = exhibitFocusT * exhibitFocusT * (3 - 2 * exhibitFocusT);

      fromMesh.position.copy(_slideCenterPos).addScaledVector(_slideOff, -s);
      fromMesh.quaternion.copy(_slideCenterQuat);
      fromMesh.scale.setScalar(_slideFromScale);
      fromMesh.visible = true;
      fromMesh.renderOrder = 200;

      toMesh.position.copy(_slideCenterPos).addScaledVector(_slideOff, 1 - s);
      toMesh.quaternion.copy(_slideToQuat);
      toMesh.scale.setScalar(_slideToScale);
      toMesh.visible = true;
      toMesh.renderOrder = 201;
      toMesh.material.opacity = 1;
      toMesh.material.transparent = false;

      if (exhibitFocusT >= 1) {
        exhibitFocusIdx = exhibitFocusSwitchTo;
        exhibitFocusPhase = 'focused';
        exhibitFocusSwitchTo = -1;
        exhibitFocusT = 0;
        _refreshExhibitFocusTarget(toMesh);
        _applyExhibitFocusView(toMesh);
        fromMesh.visible = false;
        exhibitPlanes.forEach((p, i) => {
          if (i !== exhibitFocusIdx) p.mesh.visible = false;
        });
        _showFocusEscapeHint();
      }
    } else if (exhibitFocusPhase === 'focused') {
      const fp = exhibitPlanes[exhibitFocusIdx];
      _refreshExhibitFocusTarget(fp.mesh);
      _applyExhibitFocusView(fp.mesh);
      fp.mesh.visible = true;
      fp.mesh.material.opacity = 1;
      fp.mesh.material.transparent = false;
      exhibitPlanes.forEach((p, i) => {
        if (i !== exhibitFocusIdx) p.mesh.visible = false;
      });
    } else if (exhibitFocusPhase === 'unfocusing') {
      const tp = exhibitPlanes[exhibitFocusIdx];
      exhibitFocusT = Math.min(1, exhibitFocusT + dt / EXHIBIT_FOCUS_DUR);
      const s = exhibitFocusT * exhibitFocusT * (3 - 2 * exhibitFocusT);
      const a = _exhibitPanelAngle(exhibitFocusIdx);
      _focusToPos.set(
        exhibitCX + Math.sin(a) * EXHIBIT_ORBIT_R,
        2.0,
        exhibitCZ + Math.cos(a) * EXHIBIT_ORBIT_R
      );
      _focusHelper.position.copy(_focusToPos);
      _focusHelper.rotation.set(0, a + Math.PI, 0);
      _focusToQuat.copy(_focusHelper.quaternion);
      tp.mesh.position.lerpVectors(_focusFromPos, _focusToPos, s);
      _focusLerpQuat.slerpQuaternions(_focusFromQuat, _focusToQuat, s);
      tp.mesh.quaternion.copy(_focusLerpQuat);
      tp.mesh.scale.setScalar(_focusFromScale + (1 - _focusFromScale) * s);
      tp.mesh.renderOrder = Math.round(200 * (1 - s));
      tp.mesh.visible = true;
      tp.mesh.material.transparent = false;
      tp.mesh.material.opacity = 1;
      exhibitPlanes.forEach((p, i) => {
        if (i === exhibitFocusIdx) return;
        p.mesh.material.transparent = true;
        p.mesh.material.opacity = Math.min(1, s * 1.15);
        p.mesh.visible = p.mesh.material.opacity > 0.04;
        _applyExhibitPanelTransform(p, i, exhibitAngle);
        p.mesh.scale.setScalar(0.05 + s * 0.95);
      });
      if (exhibitFocusT >= 1) {
        tp.mesh.renderOrder = 0;
        exhibitFocusIdx = -1;
        exhibitFocusPhase = null;
        exhibitFocusT = 0;
        exhibitPlanes.forEach(p => {
          p.mesh.material.transparent = false;
          p.mesh.material.opacity = 1;
          p.mesh.renderOrder = 0;
        });
        _showExhibitHint();
      }
    } else {
      exhibitPlanes.forEach((p, i) => {
        const a = _exhibitPanelAngle(i);
        p.mesh.position.x = exhibitCX + Math.sin(a) * EXHIBIT_ORBIT_R;
        p.mesh.position.y = 2.0;
        p.mesh.position.z = exhibitCZ + Math.cos(a) * EXHIBIT_ORBIT_R;
        // Explicitly zero X/Z so no residual tilt from focus slerp survives.
        p.mesh.rotation.set(0, a + Math.PI, 0);
        p.mesh.scale.setScalar(1);
        p.mesh.material.transparent = false;
        p.mesh.material.opacity = 1;
        if (exhibitPhase === 'open') p.mesh.visible = Math.cos(a - yaw) > -0.6;
      });
    }

    if (exhibitPhase === 'opening') {
      exhibitT = Math.min(1, exhibitT + dt / EXHIBIT_OPEN_DUR);
      exhibitPlanes.forEach((p, i) => {
        const stagger = EXHIBIT_STAGGER[i] || EXHIBIT_STAGGER[EXHIBIT_STAGGER.length - 1];
        const elapsed = exhibitT * EXHIBIT_OPEN_DUR - stagger;
        const rem     = EXHIBIT_OPEN_DUR - stagger;
        const lt      = Math.max(0, Math.min(1, elapsed / rem));
        const s       = lt * lt * (3 - 2 * lt);
        p.mesh.scale.setScalar(0.05 + s * 0.95);
      });
      if (exhibitT >= 1) {
        exhibitPhase = 'open';
        _showExhibitHint();
      }
    } else if (exhibitPhase === 'closing') {
      exhibitT = Math.max(0, exhibitT - dt / EXHIBIT_CLOSE_DUR);
      const s = exhibitT * exhibitT * (3 - 2 * exhibitT);
      exhibitPlanes.forEach(p => { p.mesh.scale.setScalar(0.05 + s * 0.95); });
      if (exhibitT <= 0) _closeExhibit();
    }
  }

  // ── VINYL CRATE animation tick ──
  if (cratePhase) {
    _elMmWrap.classList.toggle('focus-hidden', crateFocusPhase === 'pulling' || crateFocusPhase === 'pulled');

    if (cratePhase === 'opening') {
      crateT = Math.min(1, crateT + dt / CRATE_OPEN_DUR);
      const s = crateT * crateT * (3 - 2 * crateT);
      if (crateGroup) crateGroup.scale.setScalar(0.04 + s * 0.96);
      if (crateT >= 1) { cratePhase = 'browsing'; _syncCratePreview(); }
    } else if (cratePhase === 'closing') {
      crateT = Math.max(0, crateT - dt / CRATE_CLOSE_DUR);
      const s = crateT * crateT * (3 - 2 * crateT);
      if (crateGroup) crateGroup.scale.setScalar(0.04 + s * 0.96);
      if (crateT <= 0) { _closeCrate(); }
    }

    if (crateGroup) {
      crateGroup.position.y = CRATE_Y + Math.sin(t * 1.4) * 0.03;

      // Keep the card-overlay iframe locked to the 3D card face every frame.
      if (cratePhase === 'browsing' && !crateFocusPhase &&
          _elVinylPanel && _elVinylPanel.classList.contains('card-overlay')) {
        _positionPanelOnCard();
      }

      // Fan the records toward their crate-digging targets (skip the focused one)
      const k = Math.min(1, dt * 9);
      crateRecords.forEach((r, i) => {
        if (crateFocusPhase && i === crateSelIdx) return;
        const tgt = _crateRecordTargets(i);
        const ud = r.userData;
        ud.lean += (tgt.lean - ud.lean) * k;
        ud.z    += (tgt.z - ud.z) * k;
        ud.lift += (tgt.lift - ud.lift) * k;
        ud.discOut += (0 - ud.discOut) * k;
        r.position.set(0, RECORD_BASE_Y + ud.lift, ud.z);
        r.rotation.set(ud.lean, 0, 0);
        r.renderOrder = ud.lift > 0.02 ? 1 : 0;
        ud.disc.position.y = DISC_PEEK + ud.discOut;
      });

      // Pull-out / flip / return of the selected record (animated in world space)
      if (crateFocusPhase) {
        const r = crateRecords[crateSelIdx];
        const ud = r.userData;
        if (crateFocusPhase === 'pulling') {
          crateFocusT = Math.min(1, crateFocusT + dt / EXHIBIT_FOCUS_DUR);
          const s = crateFocusT * crateFocusT * (3 - 2 * crateFocusT);
          const rec = VINYL.records[crateSelIdx];
          const fs = _crateRecordFocusScale(rec);
          r.position.lerpVectors(_focusFromPos, _focusToPos, s);
          _focusLerpQuat.slerpQuaternions(_focusFromQuat, _focusToQuat, s);
          r.quaternion.copy(_focusLerpQuat);
          r.scale.setScalar(_focusFromScale + (fs - _focusFromScale) * s);
          r.renderOrder = 200;
          ud.discOut += (DISC_OUT - ud.discOut) * k;
          ud.disc.position.y = DISC_PEEK + ud.discOut;
          if (crateFocusT >= 1) {
            crateFocusPhase = 'pulled';
            if (_vinylRecHasMedia(rec)) {
              // Promote from card-overlay to full centred panel (no iframe reload).
              _showVinylMedia(rec, false);
              // Hand off to the unified card: hide the 3D record so the HTML
              // player card is the single visual.
              if (ud.sleeve) ud.sleeve.visible = false;
              if (ud.disc) ud.disc.visible = false;
            }
            _showCrateHint('pulled');
          }
        } else if (crateFocusPhase === 'pulled') {
          const rec = VINYL.records[crateSelIdx];
          // Media records are represented by the centred HTML card (CSS-positioned),
          // so the hidden 3D record needs no per-frame work. Others flip in 3D.
          if (!_vinylRecHasMedia(rec)) {
            const fs = _crateRecordFocusScale(rec);
            crateFlipT += ((crateFlipped ? 1 : 0) - crateFlipT) * Math.min(1, dt * 7);
            _crateFlipQ.setFromAxisAngle(_crateUpY, Math.PI * crateFlipT);
            _crateTmpQ.copy(_focusToQuat).multiply(_crateFlipQ);
            r.position.copy(_focusToPos);
            r.quaternion.copy(_crateTmpQ);
            r.scale.setScalar(fs);
            r.renderOrder = 200;
            ud.disc.position.y = DISC_PEEK + DISC_OUT;
          }
        } else if (crateFocusPhase === 'returning') {
          crateFocusT = Math.min(1, crateFocusT + dt / EXHIBIT_FOCUS_DUR);
          const s = crateFocusT * crateFocusT * (3 - 2 * crateFocusT);
          const tgt = _crateRecordTargets(crateSelIdx);
          crateGroup.updateMatrixWorld();
          _crateTmpV.set(0, RECORD_BASE_Y + tgt.lift, tgt.z).applyMatrix4(crateGroup.matrixWorld);
          _crateEuler.set(tgt.lean, 0, 0);
          _crateTmpQ.setFromEuler(_crateEuler).premultiply(crateGroup.quaternion);
          r.position.lerpVectors(_focusFromPos, _crateTmpV, s);
          _focusLerpQuat.slerpQuaternions(_focusFromQuat, _crateTmpQ, s);
          r.quaternion.copy(_focusLerpQuat);
          r.scale.setScalar(_focusFromScale + (1 - _focusFromScale) * s);
          ud.discOut += (0 - ud.discOut) * k;
          ud.disc.position.y = DISC_PEEK + ud.discOut;
          if (crateFocusT >= 1) {
            crateGroup.attach(r);
            r.position.set(0, RECORD_BASE_Y + tgt.lift, tgt.z);
            r.rotation.set(tgt.lean, 0, 0);
            r.scale.setScalar(1);
            r.renderOrder = tgt.lift > 0.02 ? 1 : 0;
            ud.lean = tgt.lean; ud.z = tgt.z; ud.lift = tgt.lift; ud.discOut = 0;
            ud.disc.position.y = DISC_PEEK;
            crateFocusPhase = null;
            crateFocusT = 0;
            _syncCratePreview();
            _showCrateHint('browsing');
          }
        }
      }
    }
  }

  _elKeySpace.classList.toggle('active', !!(near.ref && !exhibitOpen && !crateOpen) || exhibitCanFocus || exhibitFocusPhase === 'focused' || crateFocusPhase === 'pulled' || (cratePhase === 'browsing' && !crateFocusPhase));

  renderer.render(scene, camera);
  _tickTutPreview();
  _mmFrame++;
  if (!isMobile || _mmFrame % 3 === 0) drawMinimap();

  // Position guide dot at the orb's screen projection
  if (tutStage <= 1 && _tutGuideDot.classList.contains('visible')) {
    const _orbWorld = new THREE.Vector3();
    orbMesh.getWorldPosition(_orbWorld);
    _orbWorld.project(camera);
    const sx = ( _orbWorld.x * 0.5 + 0.5) * window.innerWidth;
    const sy = (-_orbWorld.y * 0.5 + 0.5) * window.innerHeight;
    _tutGuideDot.style.left = (sx - 10) + 'px';
    _tutGuideDot.style.top  = (sy - 10) + 'px';
  }
}

window.addEventListener('resize', () => {
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});

animate();

// ══════════════════════════════════════════
//  MINIMAP
// ══════════════════════════════════════════
const _mm     = document.getElementById('minimap');
const _mmCtx  = _mm.getContext('2d');
const _mmWrap = document.getElementById('minimap-wrap');
const MM_SIZE  = 120;  // canvas px
const MM_WORLD = 36;   // world units across the map
const MM_SCALE = MM_SIZE / MM_WORLD;
const MM_CX    = MM_SIZE / 2;
const MM_CY    = MM_SIZE / 2;
const MM_R     = MM_SIZE / 2 - 1;

function _mmPt(wx, wz) {
  return [ MM_CX + wx * MM_SCALE, MM_CY + wz * MM_SCALE ];
}

function drawMinimap() {
  if (!roomRevealed) return;
  if (!_mmWrap.classList.contains('visible')) _mmWrap.classList.add('visible');

  const ctx = _mmCtx;
  ctx.clearRect(0, 0, MM_SIZE, MM_SIZE);
  ctx.save();

  // Circular clip
  ctx.beginPath();
  ctx.arc(MM_CX, MM_CY, MM_R, 0, Math.PI * 2);
  ctx.clip();

  // Background
  ctx.fillStyle = 'rgba(4,2,1,0.82)';
  ctx.fillRect(0, 0, MM_SIZE, MM_SIZE);

  // Rotate entire world around canvas centre by player yaw
  // so "forward" is always up, GTA-style
  ctx.save();
  ctx.translate(MM_CX, MM_CY);
  ctx.rotate(yaw - Math.PI);   // forward (+Z) maps to canvas-down, so offset by π to flip it up
  ctx.translate(-MM_CX, -MM_CY);

  // Helper: world pos → canvas pos, relative to player (player = canvas centre)
  const toMM = (wx, wz) => [
    MM_CX + (wx - player.position.x) * MM_SCALE,
    MM_CY + (wz - player.position.z) * MM_SCALE
  ];

  // Room boundary
  ctx.strokeStyle = 'rgba(255,200,100,0.12)';
  ctx.lineWidth = 1;
  const [bx0, by0] = toMM(-23, -23);
  const [bx1, by1] = toMM( 23,  23);
  ctx.strokeRect(bx0, by0, bx1 - bx0, by1 - by0);

  // Floater dots
  floaters.forEach((f, i) => {
    const col = floaterData[i].color;
    const cr = (col >> 16) & 0xff;
    const cg = (col >>  8) & 0xff;
    const cb =  col        & 0xff;
    const [fx, fz] = toMM(f.mesh.position.x, f.mesh.position.z);
    ctx.beginPath();
    ctx.arc(fx, fz, 4.5, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${cr},${cg},${cb},0.18)`;
    ctx.fill();
    ctx.beginPath();
    ctx.arc(fx, fz, 2.2, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${cr},${cg},${cb},0.9)`;
    ctx.fill();
  });

  ctx.restore(); // end world rotation

  // Player — fixed upward-pointing triangle at canvas centre
  ctx.save();
  ctx.translate(MM_CX, MM_CY);
  ctx.beginPath();
  ctx.moveTo(0, -7);
  ctx.lineTo( 4, 4);
  ctx.lineTo(-4, 4);
  ctx.closePath();
  ctx.fillStyle = 'rgba(255,235,160,0.97)';
  ctx.shadowColor = 'rgba(255,180,60,0.9)';
  ctx.shadowBlur = 7;
  ctx.fill();
  ctx.restore();

  ctx.restore(); // end clip

  // Outer border ring
  ctx.beginPath();
  ctx.arc(MM_CX, MM_CY, MM_R, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(255,200,100,0.28)';
  ctx.lineWidth = 1;
  ctx.stroke();
}
</script>
